<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkHub Studio · 资源库 · 高保真交互原型</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #0f172a; font-size: 14px; line-height: 1.6; overflow: hidden; }

  .topbar { height: 56px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 24px; gap: 20px; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
  .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
  .tenant-select { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 5px 12px; border-radius: 6px; font-size: 13px; color: #475569; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 18px; font-size: 13px; color: #475569; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #f59e0b, #ec4899); color: #fff; font-weight: 700; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; }

  .layout { display: flex; height: calc(100% - 56px); }
  .sidebar { width: 200px; background: #fff; border-right: 1px solid #e5e7eb; padding: 14px 10px; flex-shrink: 0; overflow-y: auto; }
  .side-group { font-size: 11px; color: #94a3b8; padding: 10px 12px 4px; letter-spacing: .5px; }
  .side-item { padding: 8px 12px; border-radius: 8px; margin: 2px 0; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .side-item:hover { background: #f8fafc; }
  .side-item.active { background: #ede9fe; color: #6d28d9; font-weight: 600; }
  .side-title { font-size: 11px; color: #94a3b8; padding: 12px 12px 4px; letter-spacing: .5px; font-weight: 700; }
  .side-sep { height: 1px; background: #f1f5f9; margin: 8px 8px; }
  .main { flex: 1; overflow-y: auto; padding: 22px 26px; position: relative; }

  .page-head { display: flex; align-items: center; margin-bottom: 6px; }
  .page-head h1 { font-size: 20px; font-weight: 700; }
  .desc { color: #94a3b8; font-size: 13px; margin-bottom: 16px; }

  .btn { border: none; border-radius: 8px; padding: 8px 15px; font-size: 13px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .btn.primary { background: #4f46e5; color: #fff; }
  .btn.ghost { background: #fff; border: 1px solid #d1d5db; color: #374151; }
  .btn.ghost:hover { background: #f8fafc; }
  .btn.sm { padding: 6px 12px; font-size: 12px; }

  .rl-bar { display: flex; align-items: center; gap: 18px; margin-bottom: 14px; }
  .tabs { display: flex; gap: 18px; }
  .tab { font-size: 14px; color: #94a3b8; cursor: pointer; padding-bottom: 4px; border-bottom: 2px solid transparent; }
  .tab:hover { color: #475569; }
  .tab.active { color: #0f172a; font-weight: 700; border-bottom-color: #ea580c; }
  .bar-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
  .search { border: 1px solid #d1d5db; border-radius: 8px; padding: 7px 12px; font-size: 13px; min-width: 240px; }
  .search:focus { outline: none; border-color: #6366f1; }

  .dd { position: relative; }
  .dd-btn { border: 1px solid #d1d5db; border-radius: 8px; padding: 7px 12px; font-size: 13px; color: #475569; cursor: pointer; background: #fff; display: inline-flex; align-items: center; gap: 6px; }
  .dd-btn.on { border-color: #6366f1; color: #4338ca; background: #eef2ff; }
  .dd-menu { display: none; position: absolute; top: 40px; right: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.1); padding: 6px; min-width: 210px; z-index: 30; }
  .dd-menu.show { display: block; }
  .dd-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 7px; font-size: 13px; color: #475569; cursor: pointer; }
  .dd-opt:hover { background: #f8fafc; }
  .dd-opt .ck { width: 14px; color: #4f46e5; font-weight: 700; }
  .dd-div { height: 1px; background: #f1f5f9; margin: 4px 2px; }

  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; }
  th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 12px; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr:last-child td { border-bottom: none; }
  .fname { display: flex; align-items: center; gap: 10px; }
  .fico { width: 28px; height: 28px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; font-weight: 700; flex-shrink: 0; }
  .fname b { font-weight: 500; color: #0f172a; }
  .fname .favmark { color: #f59e0b; font-size: 13px; }
  .fname .ext-open { color: #ea580c; font-size: 11px; border: 1px solid #fed7aa; background: #fff7ed; border-radius: 4px; padding: 0 5px; }
  .src { color: #64748b; }
  .src.clk { cursor: pointer; }
  .src.clk:hover { color: #ea580c; }
  .creator { color: #64748b; font-family: Menlo, monospace; font-size: 12px; }
  .acts { display: flex; gap: 14px; color: #64748b; }
  .acts span { cursor: pointer; display: inline-flex; align-items: center; gap: 3px; }
  .acts span:hover { color: #4f46e5; }
  .acts .fav.on { color: #f59e0b; }
  .empty { padding: 60px; text-align: center; color: #94a3b8; }

  /* 大预览 modal */
  .pv-mask { position: fixed; inset: 0; background: rgba(15,23,42,.5); display: none; z-index: 60; }
  .pv-mask.show { display: flex; align-items: center; justify-content: center; }
  .pv-modal { width: min(1120px, 94vw); height: 90vh; background: #fff; border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 24px 70px rgba(0,0,0,.32); }
  .pm-head { padding: 15px 22px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .pm-ico { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 12px; }
  .pm-name { font-weight: 700; font-size: 15px; }
  .pm-sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .pm-acts { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .pm-x { cursor: pointer; color: #94a3b8; font-size: 22px; padding-left: 6px; }
  .pm-body { flex: 1; overflow: auto; padding: 30px; background: #f1f5f9; display: flex; justify-content: center; }
  .pm-page { width: 100%; max-width: 820px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); padding: 40px 48px; min-height: 100%; }
  .pv-md { font-size: 14px; color: #334155; line-height: 1.8; }
  .pv-md h1 { font-size: 24px; margin-bottom: 14px; }
  .pv-md h4 { font-size: 16px; margin: 18px 0 8px; }
  .pv-md table { margin: 12px 0; }
  .pv-md th, .pv-md td { border: 1px solid #e5e7eb; padding: 8px 12px; }
  .pv-md ul { padding-left: 22px; }
  .pv-code { font-family: Menlo, Consolas, monospace; font-size: 13px; white-space: pre-wrap; background: #0f172a; color: #e2e8f0; padding: 22px; border-radius: 12px; line-height: 1.8; }
  .pv-img { width: 100%; min-height: 420px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 76px; color: #fff; }
  .pv-doc { border: 1.5px dashed #cbd5e1; border-radius: 14px; padding: 70px 20px; text-align: center; color: #94a3b8; }
  .pv-doc .ic { font-size: 60px; margin-bottom: 14px; }

  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0f172a; color: #fff; padding: 11px 20px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="logo-icon">W</span>WorkHub Studio</div>
  <div class="tenant-select">🏢 网易 NoteBook 租户 ▾</div>
  <div class="topbar-right"><span>AI 工厂</span><div class="avatar">张</div></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="side-title">AI 工厂</div>
    <div class="side-item">🧬 Models</div>
    <div class="side-item">📝 Prompts</div>
    <div class="side-item">✨ Skills</div>
    <div class="side-item">🔧 工具</div>
    <div class="side-item">🔌 MCP</div>
    <div class="side-item">📖 知识</div>
    <div class="side-sep"></div>
    <div class="side-title">Agent 管理</div>
    <div class="side-item">🤖 Bots</div>
    <div class="side-item">🧠 Agents</div>
    <div class="side-item">🧩 记忆</div>

  <div class="main">
    <div class="page-head"><h1>📦 资源库</h1></div>
    <div class="desc">集中管理 Agent 产出的结果交付物，支持收藏、搜索、筛选、预览与下载 · 多端可取</div>

    <div class="rl-bar">
      <div class="tabs">
        <div class="tab active" data-tab="all" onclick="switchTab('all')">全部</div>

    <div class="card">

</div>

<!-- 大预览 -->
<div class="pv-mask" id="pvMask" onclick="closePv(event)">
  <div class="pv-modal" onclick="event.stopPropagation()">
    <div class="pm-head">
      <span class="pm-ico" id="pmIco"></span>
      <div><div class="pm-name" id="pmName"></div><div class="pm-sub" id="pmSub"></div></div>
      <div class="pm-acts">
        <button class="btn ghost sm" onclick="locate(curPvId)">📍 在任务中定位</button>
        <button class="btn ghost sm" onclick="toast('开始下载…')">⬇ 下载</button>
        <button class="btn ghost sm" id="pmFav" onclick="favFromPv()"></button>
        <span class="pm-x" onclick="closePv()">×</span>
      </div>
    </div>
    <div class="pm-body"><div class="pm-page" id="pmPage"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EXT = {
  md:{color:"#0ea5e9",cat:"doc"}, docx:{color:"#2563eb",cat:"doc"}, pdf:{color:"#dc2626",cat:"doc"}, txt:{color:"#64748b",cat:"doc"},
  xlsx:{color:"#16a34a",cat:"data"}, csv:{color:"#16a34a",cat:"data"}, json:{color:"#0891b2",cat:"data"},
  html:{color:"#ea580c",cat:"web"}, css:{color:"#0ea5e9",cat:"web"}, js:{color:"#eab308",cat:"web"},
  py:{color:"#ca8a04",cat:"code"}, sh:{color:"#334155",cat:"code"}, zip:{color:"#78716c",cat:"code"},
  png:{color:"#ec4899",cat:"media"}, jpg:{color:"#ec4899",cat:"media"}, svg:{color:"#8b5cf6",cat:"chart"},
  mp4:{color:"#7c3aed",cat:"media"}, pptx:{color:"#dc2626",cat:"media"}, mmd:{color:"#059669",cat:"chart"},
  cloud:{color:"#0891b2",cat:"cloud"}
};
const CATS = { doc:"文档与文字", web:"网页与应用", data:"数据与表格", code:"代码与脚本", media:"多媒体与设计", chart:"图表与架构", cloud:"云空间产物" };
// 点击后直接在浏览器打开、不在后台预览的类型
const OPEN_IN_BROWSER = new Set(["html", "cloud"]);

let items = [
  { id:1, name:"会议纪要.md", ext:"md", src:"深度研究员 · 会议纪要生成", creator:"hzdingyuqing@corp.netease.com", size:"12 KB", time:"2026-07-23 15:08", fav:true,
    pv:`<div class="pv-md"><h1>📝 项目周会纪要（2026-07-23）</h1><p><b>参会：</b>青远、李四、王五 · <b>时长：</b>30+ min · <b>Owner：</b>平台架构组</p><h4>核心议题</h4><ul><li>资源库一期只收结果交付物，过程产物不入库</li><li>支持收藏、来源跳转、多端可取</li><li>预览：html / POPO 直接浏览器打开</li></ul><h4>关键决策</h4><table><tr><th>事项</th><th>结论</th></tr><tr><td>入库范围</td><td>仅结果交付物</td></tr><tr><td>预览策略</td><td>大预览 + 浏览器直开</td></tr></table><h4>待办</h4><ul><li>青远：原型评审前置</li><li>李四：埋点采集对齐</li></ul></div>` },
  { id:2, name:"agenthub会议转录原文.docx", ext:"docx", src:"深度研究员 · 转录", creator:"sangchen@corp.netease.com", size:"48 KB", time:"2026-07-23 15:02", fav:false,
    pv:`<div class="pv-doc"><div class="ic">📄</div>Word 文档在线预览（示意）<div style="margin-top:8px;font-size:13px;">docx 内嵌渲染，可翻页 / 下载后用 Word 打开</div></div>` },
  { id:3, name:"数据分析结果.xlsx", ext:"xlsx", src:"数据助手 · 报表导出", creator:"wangzimingzhang01@corp.netease.com", size:"86 KB", time:"2026-07-23 14:20", fav:false,
    pv:`<div class="pv-md"><h1>📊 会话渠道分析</h1><table><tr><th>渠道</th><th>会话数</th><th>Token</th><th>平均时长</th></tr><tr><td>workflow</td><td>128</td><td>2.1M</td><td>0:42</td></tr><tr><td>智能体机器人</td><td>342</td><td>5.6M</td><td>0:21</td></tr><tr><td>合计</td><td>470</td><td>7.7M</td><td>0:27</td></tr></table></div>` },
  { id:4, name:"项目周报（POPO 文档）", ext:"cloud", src:"周报 Agent · 自动化任务", creator:"zhaoxiaoshuai@corp.netease.com", size:"链接", time:"2026-07-23 09:00", fav:false, pv:"" },
  { id:5, name:"竞品分析报告.pdf", ext:"pdf", src:"深度研究员 · 报告", creator:"liweizhen02@corp.netease.com", size:"1.2 MB", time:"2026-07-22 18:40", fav:true,
    pv:`<div class="pv-doc"><div class="ic">📕</div>PDF 内嵌预览（示意）<div style="margin-top:8px;font-size:13px;">支持翻页 / 缩放 / 下载</div></div>` },
  { id:6, name:"落地页原型.html", ext:"html", src:"前端助手 · 页面生成", creator:"cuiyixian@corp.netease.com", size:"24 KB", time:"2026-07-22 16:10", fav:false, pv:"" },
  { id:7, name:"系统架构图.svg", ext:"svg", src:"架构助手 · 绘图", creator:"baifan03@corp.netease.com", size:"8 KB", time:"2026-07-22 11:05", fav:false,
    pv:`<div class="pv-img" style="background:linear-gradient(135deg,#8b5cf6,#6366f1);">🗺️</div><p style="margin-top:14px;color:#64748b;text-align:center;">SVG 矢量图 · 可无损缩放</p>` },
  { id:8, name:"宣传海报.png", ext:"png", src:"设计助手 · AI 生图", creator:"zhuxinyan02@corp.netease.com", size:"640 KB", time:"2026-07-21 20:30", fav:false,
    pv:`<div class="pv-img" style="background:linear-gradient(135deg,#ec4899,#f59e0b);">🖼️</div><p style="margin-top:14px;color:#64748b;text-align:center;">PNG 图片 · 1024×1536</p>` },
  { id:9, name:"数据清洗.py", ext:"py", src:"数据助手 · 脚本", creator:"wb.yanghuihui02@mesg.corp.netease.com", size:"4 KB", time:"2026-07-21 15:12", fav:false,
    pv:`<div class="pv-code">import pandas as pd

df = pd.read_csv("raw.csv")
df = df.dropna().drop_duplicates()
df["date"] = pd.to_datetime(df["date"])
df.to_csv("clean.csv", index=False)
print("done", len(df))</div>` },
  { id:10, name:"产品介绍.mp4", ext:"mp4", src:"视频助手 · 生成", creator:"wanganming@corp.netease.com", size:"12 MB", time:"2026-07-21 10:00", fav:false,
    pv:`<div class="pv-img" style="background:#0f172a;">▶️</div><p style="margin-top:14px;color:#64748b;text-align:center;">MP4 视频 · 00:38 · 1080p</p>` }
];

let curTab = "all", selCats = new Set(), curPvId = null;

function ficoText(ext) { return ext === "cloud" ? "☁" : ext.slice(0, 3); }

function renderFilters() {
  const opts = Object.entries(CATS).map(([k,v]) =>
    `<div class="dd-opt" onclick="toggleCat(event,'${k}')"><span class="ck">${selCats.has(k)?'✓':''}</span>${v}</div>`).join('');
  document.getElementById('ddMenu').innerHTML =
    `<div class="dd-opt" onclick="clearCats(event)"><span class="ck">${selCats.size===0?'✓':''}</span>全部类型</div><div class="dd-div"></div>${opts}`;
  document.getElementById('filterBtn').className = "dd-btn" + (selCats.size ? " on" : "");
  document.getElementById('filterBtn').textContent = selCats.size ? `▾ 筛选 · ${selCats.size}` : "▾ 筛选";
}
function toggleDD(e){ e.stopPropagation(); document.getElementById('ddMenu').classList.toggle('show'); }
function openDD(){ document.getElementById('ddMenu').classList.add('show'); }
function toggleCat(e,k){ e.stopPropagation(); selCats.has(k)?selCats.delete(k):selCats.add(k); renderFilters(); openDD(); renderList(); }
function clearCats(e){ e.stopPropagation(); selCats.clear(); renderFilters(); openDD(); renderList(); }
document.addEventListener('click', (e) => { if (!e.target.closest('.dd')) document.getElementById('ddMenu').classList.remove('show'); });

function switchTab(t){ curTab=t; document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.dataset.tab===t)); renderList(); }

function renderList() {
  const kw = (document.getElementById('kw').value || "").trim();
  const rows = items.filter(it => {
    if (curTab === "fav" && !it.fav) return false;
    if (selCats.size && !selCats.has(EXT[it.ext].cat)) return false;
    if (kw && !(it.name + it.src + it.creator).includes(kw)) return false;
    return true;
  });
  const body = document.getElementById('rlBody');
  if (!rows.length) { body.innerHTML = `<tr><td colspan="6"><div class="empty">📭 暂无匹配的资源</div></td></tr>`; return; }
  body.innerHTML = rows.map(it => {
    const openTag = OPEN_IN_BROWSER.has(it.ext) ? `<span class="ext-open">↗ 浏览器打开</span>` : '';
    return `
    <tr onclick="openItem(${it.id})">
      <td><div class="fname">
        <span class="fico" style="background:${EXT[it.ext].color}">${ficoText(it.ext)}</span>
        <b>${it.name}</b>
        ${it.fav ? '<span class="favmark">★</span>' : ''}
        ${openTag}
      </div></td>
      <td><span class="src clk" onclick="event.stopPropagation();locate(${it.id})">${it.src}</span></td>
      <td class="creator">${it.creator}</td>
      <td class="src">${it.size}</td>
      <td class="src">${it.time}</td>
      <td><div class="acts">
        <span onclick="event.stopPropagation();locate(${it.id})">📍 定位</span>
        <span onclick="event.stopPropagation();toast('开始下载…')">⬇ 下载</span>
        <span class="fav ${it.fav?'on':''}" onclick="event.stopPropagation();toggleFav(${it.id})">${it.fav?'★ 取消收藏':'☆ 收藏'}</span>
      </div></td>
    </tr>`;
  }).join('');
}

function toggleFav(id) {
  const it = items.find(x => x.id === id);
  it.fav = !it.fav;
  renderList();
  if (curPvId === id) syncPvFav();
  toast(it.fav ? "已收藏" : "已取消收藏");
}

// 点击来源 / 定位：跳转对话页并锚定该产出物
function locate(id) {
  const it = items.find(x => x.id === id);
  toast(`跳转到对话页「${it.src}」，已定位到该产出物位置`);
}

// 点击文件：html / POPO 直接浏览器打开；其余大预览
function openItem(id) {
  const it = items.find(x => x.id === id);
  if (OPEN_IN_BROWSER.has(it.ext)) {
    toast(it.ext === "cloud" ? "已在浏览器打开 POPO 文档" : "已在浏览器新标签页打开 HTML 文件");
    return;
  }
  openPreview(it);
}

function openPreview(it) {
  curPvId = it.id; const e = EXT[it.ext];
  document.getElementById('pmIco').style.background = e.color;
  document.getElementById('pmIco').textContent = ficoText(it.ext);
  document.getElementById('pmName').textContent = it.name;
  document.getElementById('pmSub').textContent = `${CATS[e.cat]} · ${it.creator} · ${it.size} · ${it.time}`;
  document.getElementById('pmPage').innerHTML = it.pv;
  syncPvFav();
  document.getElementById('pvMask').classList.add('show');
}
function syncPvFav() { const it = items.find(x=>x.id===curPvId); document.getElementById('pmFav').textContent = it && it.fav ? "★ 已收藏" : "☆ 收藏"; }
function favFromPv() { toggleFav(curPvId); }
function closePv(e) { if (e && e.target && e.target.closest('.pv-modal')) return; document.getElementById('pvMask').classList.remove('show'); curPvId = null; }

let tt;
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2000); }

renderFilters();
renderList();
</script>
</body>
</html>
