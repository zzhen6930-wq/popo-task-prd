<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>Fabric · 会话管理 · 高保真交互原型</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; color: #0f172a; font-size: 14px; line-height: 1.6; overflow: hidden; }

  /* 顶栏 */
  .topbar { height: 56px; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 24px; gap: 20px; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
  .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #4f46e5, #7c3aed); color: #fff; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
  .tenant-select { background: #f1f5f9; border: 1px solid #e2e8f0; padding: 5px 12px; border-radius: 6px; font-size: 13px; color: #475569; display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 18px; font-size: 13px; color: #475569; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #f59e0b, #ec4899); color: #fff; font-weight: 700; font-size: 12px; display: inline-flex; align-items: center; justify-content: center; }

  /* 布局 */
  .layout { display: flex; height: calc(100% - 56px); }
  .sidebar { width: 200px; background: #fff; border-right: 1px solid #e5e7eb; padding: 14px 10px; flex-shrink: 0; overflow-y: auto; }
  .side-group { font-size: 11px; color: #94a3b8; padding: 10px 12px 4px; letter-spacing: .5px; }
  .side-item { padding: 8px 12px; border-radius: 8px; margin: 2px 0; color: #475569; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .side-item:hover { background: #f8fafc; }
  .side-item.active { background: #ede9fe; color: #6d28d9; font-weight: 600; }
  .main { flex: 1; overflow-y: auto; padding: 22px 26px; position: relative; }

  .page-head { display: flex; align-items: center; margin-bottom: 6px; }
  .page-head h1 { font-size: 20px; font-weight: 700; }
  .head-actions { margin-left: auto; display: flex; gap: 10px; }
  .desc { color: #94a3b8; font-size: 13px; margin-bottom: 16px; }

  .btn { border: none; border-radius: 8px; padding: 8px 15px; font-size: 13px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; }
  .btn.primary { background: #4f46e5; color: #fff; }
  .btn.primary:hover { background: #4338ca; }
  .btn.ghost { background: #fff; border: 1px solid #d1d5db; color: #374151; }
  .btn.ghost:hover { background: #f8fafc; }
  .btn.sm { padding: 5px 11px; font-size: 12px; }

  /* 筛选区 */
  .filters { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .fitem { display: flex; flex-direction: column; gap: 5px; }
  .fitem label { font-size: 12px; color: #64748b; font-weight: 600; }
  .fitem input, .fitem select { border: 1px solid #d1d5db; border-radius: 8px; padding: 7px 10px; font-size: 13px; min-width: 150px; background: #fff; }
  .fitem input:focus, .fitem select:focus { outline: none; border-color: #6366f1; }
  .filters .fspacer { margin-left: auto; }

  /* 表格 */
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
  th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 12px; }
  tbody tr:hover { background: #f8fafc; }
  tbody tr:last-child td { border-bottom: none; }
  .sid { color: #4f46e5; cursor: pointer; font-family: Menlo, monospace; font-size: 12px; }
  .sid:hover { text-decoration: underline; }
  .chip { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 12px; }
  .chip.cyan { background: #cffafe; color: #0e7490; }
  .chip.purple { background: #ede9fe; color: #6d28d9; }
  .chip.green { background: #dcfce7; color: #166534; }
  .chip.gray { background: #f1f5f9; color: #64748b; }
  .chip.blue { background: #dbeafe; color: #1e40af; }
  .tk { font-family: Menlo, monospace; font-size: 12px; color: #334155; }
  .link { color: #4f46e5; cursor: pointer; font-size: 13px; }
  .link:hover { text-decoration: underline; }

  /* ============ 详情页 ============ */
  .det-top { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px 18px; margin-bottom: 12px; }
  .det-title { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .det-title h2 { font-size: 17px; }
  .det-title .st { font-size: 12px; background: #ecfeff; color: #0e7490; padding: 2px 9px; border-radius: 20px; }
  .det-metas { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
  .metapill { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px; padding: 4px 10px; font-size: 12px; color: #475569; }
  .det-sub { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .det-sub .metapill { background: #fff; }

  /* 时间线 bar */
  .tl { display: flex; gap: 2px; margin-top: 12px; height: 10px; border-radius: 5px; overflow: hidden; }
  .tl span { display: block; height: 100%; }

  /* 工具条 */
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .ftag { padding: 5px 12px; border: 1px solid #e2e8f0; background: #fff; border-radius: 20px; font-size: 12px; color: #475569; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
  .ftag:hover { border-color: #a5b4fc; }
  .ftag.active { background: #eef2ff; border-color: #6366f1; color: #4338ca; font-weight: 600; }
  .ftag .d { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
  /* 事件筛选下拉（多选） */
  .dd { position: relative; }
  .dd-btn { cursor: pointer; }
  .dd-menu { display: none; position: absolute; top: 40px; left: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.1); padding: 6px; min-width: 190px; z-index: 30; }
  .dd-menu.show { display: block; }
  .dd-opt { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 7px; font-size: 13px; color: #475569; cursor: pointer; }
  .dd-opt:hover { background: #f8fafc; }
  .dd-opt .ck { width: 14px; color: #4f46e5; font-weight: 700; }
  .dd-opt .d { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
  .dd-div { height: 1px; background: #f1f5f9; margin: 4px 2px; }
  .search { border: 1px solid #d1d5db; border-radius: 8px; padding: 6px 10px; font-size: 13px; min-width: 200px; }
  .search:focus { outline: none; border-color: #6366f1; }

  /* 详情主体：事件流 + 抽屉 */
  .det-body { display: flex; gap: 14px; align-items: flex-start; }
  .ev-list { flex: 1; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; min-width: 0; }
  .ev-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
  .ev-row:hover { background: #f8fafc; }
  .ev-row.active { background: #eef2ff; box-shadow: inset 3px 0 0 #6366f1; }
  .ev-row:last-child { border-bottom: none; }
  .ev-role { flex-shrink: 0; width: 54px; text-align: center; border-radius: 5px; font-size: 11px; padding: 3px 0; font-weight: 600; }
  .r-user { background: #fce7f3; color: #be185d; }
  .r-tool { background: #e0f2fe; color: #0369a1; }
  .r-agent { background: #ede9fe; color: #6d28d9; }
  .r-think { background: #f1f5f9; color: #475569; }
  .r-know { background: #dcfce7; color: #166534; }
  .r-mcp { background: #fef3c7; color: #b45309; }
  .r-skill { background: #f3e8ff; color: #7c3aed; }
  .r-sys { background: #f1f5f9; color: #64748b; }
  .r-err { background: #fee2e2; color: #b91c1c; }
  .ev-main { flex: 1; min-width: 0; }
  .ev-sum { color: #334155; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ev-sum .lbl { color: #94a3b8; font-size: 12px; margin-left: 6px; }
  .ev-metric { flex-shrink: 0; color: #94a3b8; font-size: 12px; display: flex; gap: 12px; align-items: center; }
  .ev-metric .mtk { font-family: Menlo, monospace; }
  .ev-idle { text-align: center; color: #94a3b8; font-size: 11px; padding: 6px; background: repeating-linear-gradient(45deg,#f8fafc,#f8fafc 8px,#f1f5f9 8px,#f1f5f9 16px); border-bottom: 1px solid #f1f5f9; }

  /* 抽屉（内嵌右侧面板） */
  .drawer { width: 35%; flex-shrink: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; align-self: stretch; display: none; flex-direction: column; max-height: calc(100vh - 240px); }
  .drawer.show { display: flex; }
  .dh { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; }
  .dh-top { display: flex; align-items: center; gap: 8px; }
  .dh-top .x { margin-left: auto; cursor: pointer; color: #94a3b8; font-size: 20px; }
  .dh-title { font-weight: 700; font-size: 14px; }
  .dh-meta { font-size: 11px; color: #94a3b8; font-family: Menlo, monospace; margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
  .view-tabs { display: flex; gap: 6px; margin-top: 10px; }
  .vtab { padding: 4px 12px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 12px; cursor: pointer; color: #475569; }
  .vtab.active { background: #eef2ff; border-color: #6366f1; color: #4338ca; font-weight: 600; }
  .db { padding: 16px; overflow-y: auto; flex: 1; }
  .sub-ev { border: 1px solid #eef2f7; border-radius: 9px; padding: 10px 12px; margin-bottom: 12px; }
  .sub-ev .se-h { font-family: Menlo, monospace; font-size: 12px; color: #6366f1; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .sub-ev .se-h .cp { margin-left: auto; cursor: pointer; color: #94a3b8; }
  .q-box { background: #f8fafc; border: 1px solid #eef2f7; border-radius: 7px; padding: 8px 10px; font-size: 12.5px; color: #334155; }
  .res-title { color: #0369a1; font-size: 12.5px; margin-bottom: 3px; }
  .raw { font-family: Menlo, monospace; font-size: 11.5px; white-space: pre-wrap; color: #334155; background: #0f172a08; padding: 12px; border-radius: 8px; line-height: 1.7; }
  .md h4 { font-size: 13px; margin: 8px 0 6px; }
  .md p { font-size: 13px; color: #334155; margin-bottom: 8px; }
  .md table { margin: 8px 0; font-size: 12.5px; }
  .md th, .md td { border: 1px solid #e5e7eb; padding: 6px 9px; white-space: normal; }
  .md ul { padding-left: 20px; font-size: 13px; color: #334155; }
  .md a { color: #0369a1; }
  .err-box { background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 12px; }
  .err-box .ec { font-family: Menlo, monospace; color: #b91c1c; font-weight: 700; margin-bottom: 6px; }

  .toast { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0f172a; color: #fff; padding: 11px 20px; border-radius: 10px; font-size: 13px; opacity: 0; transition: all .3s; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="logo-icon">F</span>Fabric</div>
  <div class="tenant-select">🏢 网易 NoteBook 租户 ▾</div>
  <div class="topbar-right"><span>AI 工厂</span><div class="avatar">张</div></div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="side-group">AI 工厂</div>
    <div class="side-item">💬 对话</div>
    <div class="side-item">🤖 Bots</div>
    <div class="side-item">🧠 Agents</div>
    <div class="side-item">👥 Teams</div>
    <div class="side-item">🧩 Models</div>
    <div class="side-item">📝 Prompts</div>
    <div class="side-item">⚙️ Skills</div>
    <div class="side-item">🧠 记忆</div>
    <div class="side-item">🔧 工具</div>
    <div class="side-item active">🗂️ 会话</div>
    <div class="side-item">⚡ 自动化任务</div>
  </div>

  <div class="main">
    <!-- ============ 列表页 ============ -->
    <div id="listView">
      <div class="page-head">
        <div><h1>🗂️ 会话查询</h1></div>
        <div class="head-actions"><button class="btn primary">⬇ 导出 Excel</button></div>
      </div>
      <div class="desc">查询当前组织下的会话列表，可查看全链路事件详情或导出。默认展示今日创建的会话。</div>

      <div class="filters">
        <div class="fitem"><label>Bot</label><select><option>全部 Bot</option><option>深度研究员</option><option>Echo Agent-IT服务中心</option></select></div>
        <div class="fitem"><label>会话 ID</label><input placeholder="精确匹配"></div>
        <div class="fitem"><label>渠道类型</label><select><option>全部渠道</option><option>workflow</option><option>智能体机器人</option></select></div>
        <div class="fitem"><label>用户</label><input placeholder="用户 ID / 邮箱"></div>
        <div class="fitem"><label>开始时间</label><input value="2026-07-23 00:00:00"></div>
        <div class="fitem"><label>结束时间</label><input value="2026-07-24 00:00:00"></div>
        <div class="fspacer"></div>
        <div class="fitem"><button class="btn ghost">🔄 刷新</button></div>
        <div class="fitem"><button class="btn ghost">重置</button></div>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>会话 ID</th>
              <th>Bot</th>
              <th>渠道类型</th>
              <th>用户</th>
              <th>消息数</th>
              <th>消耗 Token</th>
              <th>状态</th>
              <th>创建时间</th>
              <th>响应时长</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="sessBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ============ 详情页 ============ -->
    <div id="detailView" class="hidden">
      <div style="margin-bottom:12px;"><span class="link" onclick="goList()">← 返回会话查询</span></div>

      <div class="det-top">
        <div class="det-title">
          <h2 id="dTitle"></h2>
          <span class="st" id="dSt"></span>
          <div class="det-metas" id="dMetas"></div>
        </div>
        <div class="det-sub" id="dSub"></div>
      </div>

      <div class="toolbar">
        <div class="seg" id="evFilters"></div>
        <div class="fspacer" style="margin-left:auto;"></div>
        <button class="btn ghost sm">⧉ 复制</button>
        <button class="btn ghost sm">⬇ 导出</button>
      </div>

      <div class="det-body">
        <div class="ev-list" id="evList"></div>
        <div class="drawer" id="drawer">
          <div class="dh">
            <div class="dh-top">
              <span class="ev-role" id="drRole"></span>
              <span class="dh-title" id="drTitle"></span>
              <span class="x" onclick="closeDrawer()">×</span>
            </div>
            <div class="dh-meta" id="drMeta"></div>
            <div class="view-tabs" id="drTabs"></div>
          </div>
          <div class="db" id="drBody"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 事件类型定义 ============
const TYPES = {
  user:  { label: "用户",   cls: "r-user",  color: "#be185d", name: "用户输入" },
  think: { label: "思考",   cls: "r-think", color: "#475569", name: "模型思考" },
  tool:  { label: "工具",   cls: "r-tool",  color: "#0369a1", name: "调用工具" },
  skill: { label: "Skills", cls: "r-skill", color: "#7c3aed", name: "Skills" },
  mcp:   { label: "MCP",    cls: "r-mcp",   color: "#b45309", name: "MCP" },
  know:  { label: "知识",   cls: "r-know",  color: "#166534", name: "知识检索" },
  agent: { label: "代理人", cls: "r-agent", color: "#6d28d9", name: "模型输出" },
  sys:   { label: "系统",   cls: "r-sys",   color: "#64748b", name: "系统信息" },
  err:   { label: "报错",   cls: "r-err",   color: "#b91c1c", name: "报错信息" }
};

// ============ 会话数据 ============
const weatherEvents = [
  { type: "user", sum: "明日杭州天气", off: "0:00:09", raw: `{"query":"明日杭州天气","tenantId":"610082037166085"}`,
    render: `<div class="q-box">明日杭州天气</div>` },
  { type: "think", sum: "分析用户意图：查询杭州 7/23 天气，需调用网页搜索获取实时预报", tin: "3.1k", tout: "120", dur: "540ms", off: "0:00:10",
    render: `<div class="md"><p>用户想了解杭州明日天气。当前无本地天气数据，需要调用「网页搜索」工具获取 7/23 的官方预报，再结构化汇总给用户。</p></div>`,
    raw: `[thinking] intent=weather_query city=杭州 date=2026-07-23 plan=web_search -> summarize` },
  { type: "tool", sum: "网页搜索", lbl: "杭州明日天气预报 2026-07-23", tin: "5.6k", tout: "69", dur: "827ms", off: "0:00:11", tool: true,
    toolUse: `"杭州明日天气预报 2026年7月23日"`,
    render: `<div class="md"><div class="res-title">杭州-天气预报 · www.nmc.cn ↗</div><p>07/23 周四 · 小雨转晴 · 东北风 微风 · 28℃~38℃。发布时间 07-21 08:00。</p><div class="res-title" style="margin-top:8px;">杭州天气7天预报 · tianqi.so.com ↗</div><p>未来一周多云到晴，最高 38℃，注意防暑。</p></div>`,
    raw: `{"tool":"web_search","input":{"q":"杭州明日天气预报 2026年7月23日"},"results":[{"title":"杭州-天气预报","url":"http://www.nmc.cn/...","snippet":"07/23 周四 小雨转晴 28-38℃"}]}` },
  { type: "agent", sum: "根据最新天气预报数据，以下是明天（7/23，周四）杭州的天气情况…", tin: "12.2k", tout: "380", dur: "7.5s", off: "0:00:20", deltas: true,
    render: `<div class="md"><p>根据最新天气预报数据，以下是<b>明天（7月23日，周四）杭州</b>的天气情况：</p><h4>🌦 杭州明日天气（2026-07-23 周四）</h4><table><tr><th>项目</th><th>详情</th></tr><tr><td>气温</td><td><b>28℃ ~ 38℃</b></td></tr><tr><td>天气</td><td>小雨转晴</td></tr><tr><td>风向</td><td>东北风，微风</td></tr></table><p>☔ 温馨提示：白天有小雨，出门记得带伞；最高 38℃，避免长时间户外活动。</p></div>`,
    raw: `{"role":"assistant","content":"根据最新天气预报数据...","finish_reason":"stop"}`,
    deltasText: `delta#1 "根据"\ndelta#2 "最新天气"\ndelta#3 "预报数据，"\n… (共 42 个增量)` },
  { type: "idle", text: "会话空闲 · 31.6 秒" },
  { type: "user", sum: "根据这个天气情况，适合去北京游玩吗？", off: "0:00:52", raw: `{"query":"根据这个天气情况，适合去北京游玩吗？"}`,

// ============ 列表 ============
function channelChip(c) {
  return c === "workflow" ? `<span class="chip cyan">workflow</span>` : `<span class="chip purple">智能体机器人</span>`;
}
function renderList() {
  document.getElementById('sessBody').innerHTML = listRows.map(r => {
    const s = r.key ? sessions[r.key] : r.s;
    const openKey = r.key || r.ref;
    return `<tr>
      <td><span class="sid" onclick="openSession('${openKey}')">${s.id.slice(0,18)}…</span></td>
      <td>${s.bot}</td>
      <td>${channelChip(s.channel)}</td>
      <td>${s.user}</td>
      <td>${s.msgs}</td>
      <td class="tk" title="输入/输出">${s.tokenTotal}</td>
      <td><span class="chip ${s.status==='active'?'green':'gray'}">${s.status}</span></td>
      <td style="color:#64748b;">${s.created}</td>
      <td style="color:#64748b;">${s.dur}</td>
      <td><span class="link" onclick="openSession('${openKey}')">查看详情</span> · <span class="link">导出</span></td>
    </tr>`;
  }).join('');
}

// ============ 状态 ============
let curSess = null, selTypes = new Set(), curEvIdx = -1, drView = "render";

// ============ 打开详情 ============
function openSession(key) {
  curSess = sessions[key]; selType = null; curEvIdx = -1;
  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
  const s = curSess;
  document.getElementById('dTitle').textContent = s.bot;
  document.getElementById('dSt').textContent = s.status === "active" ? "active" : "闲置的";
  document.getElementById('dMetas').innerHTML =
    `<span class="metapill">⏱ ${s.dur}</span><span class="metapill">🎫 ${s.token}</span><span class="metapill">🕐 ${s.ago}</span>`;
  document.getElementById('dSub').innerHTML =
    `<span class="metapill">${channelChip(s.channel)}</span><span class="metapill">📚 ${s.kb}</span><span class="metapill" style="font-family:Menlo,monospace;">🆔 ${s.id}</span>`;
  renderFilters();
  renderEvents();
  closeDrawer();
}
function goList() { document.getElementById('detailView').classList.add('hidden'); document.getElementById('listView').classList.remove('hidden'); }

// 事件筛选下拉（多选）
function ddLabelText() { return selTypes.size === 0 ? "All events" : "已选 " + selTypes.size + " 类"; }
function renderFilters() {
  const present = [...new Set(curSess.events.filter(e => e.type !== "idle").map(e => e.type))];
  const opts = present.map(t =>
    `<div class="dd-opt" onclick="toggleType(event,'${t}')"><span class="ck">${selTypes.has(t)?'✓':''}</span><span class="d" style="background:${TYPES[t].color}"></span>${TYPES[t].name}</div>`).join('');
  document.getElementById('evFilters').innerHTML = `
    <div class="dd">
      <div class="ftag active dd-btn" onclick="toggleDD(event)">🗂 <span>${ddLabelText()}</span> <span style="margin-left:2px;">▾</span></div>
      <div class="dd-menu" id="ddMenu">
        <div class="dd-opt" onclick="clearTypes(event)"><span class="ck">${selTypes.size===0?'✓':''}</span>All events</div>
        <div class="dd-div"></div>
        ${opts}
      </div>
    </div>`;
}
function toggleDD(e) { e && e.stopPropagation(); const m = document.getElementById('ddMenu'); m.classList.toggle('show'); }
function openDD() { const m = document.getElementById('ddMenu'); if (m) m.classList.add('show'); }
function toggleType(e, t) { e.stopPropagation(); if (selTypes.has(t)) selTypes.delete(t); else selTypes.add(t); renderFilters(); openDD(); renderEvents(); }
function clearTypes(e) { e.stopPropagation(); selTypes.clear(); renderFilters(); openDD(); renderEvents(); }
document.addEventListener('click', (e) => { if (!e.target.closest('.dd')) { const m = document.getElementById('ddMenu'); if (m) m.classList.remove('show'); } });

// 事件流
function renderEvents() {
  if (!curSess) return;
  let html = "";
  curSess.events.forEach((e, i) => {
    if (e.type === "idle") {
      if (selTypes.size === 0) html += `<div class="ev-idle">${e.text}</div>`;
      return;
    }
    if (selTypes.size > 0 && !selTypes.has(e.type)) return;
    const T = TYPES[e.type];
    const metric = [];
    if (e.tin) metric.push(`<span class="mtk">🎫 ${e.tin} / ${e.tout}</span>`);
    if (e.dur) metric.push(`<span>⏱ ${e.dur}</span>`);
    metric.push(`<span>${e.off}</span>`);
    html += `<div class="ev-row ${curEvIdx===i?'active':''}" onclick="openDrawer(${i})">
      <span class="ev-role ${T.cls}">${T.label}</span>
      <div class="ev-main"><div class="ev-sum">${e.sum}${e.lbl?`<span class="lbl">${e.lbl}</span>`:''}</div></div>
      <div class="ev-metric">${metric.join('')}</div>
    </div>`;
  });
  document.getElementById('evList').innerHTML = html || `<div style="padding:40px;text-align:center;color:#94a3b8;">无匹配事件</div>`;
}

// 抽屉
function openDrawer(i) {
  curEvIdx = i; drView = "render";
  const e = curSess.events[i]; const T = TYPES[e.type];
  document.getElementById('drawer').classList.add('show');
  document.getElementById('drRole').className = "ev-role " + T.cls;
  document.getElementById('drRole').textContent = T.label;
  document.getElementById('drTitle').textContent = T.name + (e.lbl ? " · " + (e.sum||"") : "");
  const m = [`event_id：sevt_…${Math.random().toString(36).slice(2,8)}`, e.off];
  if (e.dur) m.push("⏱ " + e.dur);
  if (e.tin) m.push("🎫 " + e.tin + " / " + e.tout);
  document.getElementById('drMeta').innerHTML = m.map(x => `<span>${x}</span>`).join('');
  // view tabs
  let tabs = [["render","渲染"],["raw","原始"]];
  if (e.deltas) tabs.push(["deltas","Deltas"]);
  document.getElementById('drTabs').innerHTML = tabs.map(t =>
    `<div class="vtab ${drView===t[0]?'active':''}" onclick="setView('${t[0]}')">${t[1]}</div>`).join('');
  renderDrawerBody();
  renderEvents();
}
function setView(v) {
  drView = v;
  document.querySelectorAll('#drTabs .vtab').forEach(el => el.classList.toggle('active', el.textContent === ({render:"渲染",raw:"原始",deltas:"Deltas"})[v]));
  renderDrawerBody();
}
function renderDrawerBody() {
  const e = curSess.events[curEvIdx];
  const box = document.getElementById('drBody');
  if (drView === "raw") { box.innerHTML = `<div class="raw">${escapeHtml(e.raw||"（无原始数据）")}</div>`; return; }
  if (drView === "deltas") { box.innerHTML = `<div class="raw">${escapeHtml(e.deltasText||"（无增量数据）")}</div>`; return; }
  // render
  if (e.tool) {
    box.innerHTML = `
      <div class="sub-ev"><div class="se-h">agent.tool_use<span class="cp" onclick="toast('已复制')">⧉</span></div><div class="q-box">${e.toolUse}</div></div>
      <div class="sub-ev"><div class="se-h">agent.tool_result<span class="cp" onclick="toast('已复制')">⧉</span></div>${e.render}</div>`;
  } else {
    box.innerHTML = `<div class="sub-ev"><div class="se-h">${e.type==='err'?'error':(e.type==='user'?'user.message':'agent.message')}<span class="cp" onclick="toast('已复制')">⧉</span></div>${e.render}</div>`;
  }
}
function closeDrawer() { document.getElementById('drawer').classList.remove('show'); curEvIdx = -1; renderEvents(); }
function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let tt;
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 1800); }

renderList();
</script>
