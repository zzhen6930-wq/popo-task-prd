<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>WorkHub Studio · AI 工厂「MCP」· 高保真原型</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #eef2f7; color: #1f2937; padding: 24px 16px 60px; line-height: 1.6; }

  .page-label { max-width: 1400px; margin: 6px auto 10px; display: flex; align-items: center; gap: 10px; }
  .page-label .badge-num { background: #6366f1; color: #fff; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
  .page-label .badge-title { font-size: 18px; font-weight: 700; color: #0f172a; }
  .page-label .badge-desc { font-size: 13px; color: #64748b; margin-left: 4px; }

  .app { max-width: 1400px; margin: 0 auto; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 4px 24px rgba(15,23,42,0.08); border: 1px solid #e5e7eb; height: 880px; display: flex; position: relative; }

  .topbar { position: absolute; top: 0; left: 0; right: 0; height: 56px; background: #fff; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; padding: 0 24px; z-index: 2; }
  .topbar .logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 700; color: #0f172a; }
  .topbar .logo-icon { width: 22px; height: 22px; background: linear-gradient(135deg,#4f46e5,#7c3aed); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }
  .tenant-select { margin-left: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 12px; font-size: 13px; color: #475569; display: inline-flex; align-items: center; gap: 6px; }
  .topbar .right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg,#fb923c,#f472b6); display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 700; }

  .sidebar { width: 200px; background: #fafbfc; border-right: 1px solid #f1f5f9; padding: 70px 12px 12px; overflow-y: auto; }
  .side-title { font-size: 11px; color: #94a3b8; padding: 8px 12px 4px; text-transform: uppercase; letter-spacing: .5px; }
  .side-item { font-size: 13px; color: #475569; padding: 8px 12px; border-radius: 6px; margin: 1px 0; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .side-item:hover { background: #f1f5f9; }
  .side-item.active { background: #ede9fe; color: #6d28d9; font-weight: 600; }

  .main { flex: 1; padding: 70px 28px 24px; overflow-y: auto; background: #f8fafc; position: relative; }
  .main-header { display: flex; align-items: center; margin-bottom: 6px; }
  .main-title { font-size: 22px; font-weight: 700; color: #0f172a; }
  .main-sub { font-size: 13px; color: #94a3b8; margin-bottom: 18px; }
  .btn { border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; padding: 9px 16px; display: inline-flex; align-items: center; gap: 6px; }
  .btn.primary { background: #6366f1; color: #fff; }
  .btn.primary:hover { background: #4f46e5; }
  .btn.ghost { background: #fff; color: #475569; border: 1px solid #e2e8f0; }
  .btn.sm { padding: 6px 12px; font-size: 12px; }

  /* 小卡片网格 */
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .mcp-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: all .15s; cursor: default; }
  .mcp-card:hover { border-color: #c7d2fe; box-shadow: 0 2px 10px rgba(99,102,241,0.08); }
  .mcp-card { position: relative; }
  .mcp-ico { width: 40px; height: 40px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; background: #f1f5f9; }
  .mcp-info { min-width: 0; }
  .mcp-name { font-size: 14px; font-weight: 700; color: #0f172a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mcp-desc { font-size: 12px; color: #94a3b8; margin-top: 2px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.45; }

  /* modal */
  .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.4); z-index: 20; display: none; align-items: center; justify-content: center; }
  .overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 16px; width: 620px; max-width: 94%; max-height: 88%; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
  .modal-head { padding: 18px 22px; display: flex; align-items: center; }
  .modal-head .mt { font-size: 18px; font-weight: 700; color: #0f172a; }
  .modal-head .x { margin-left: auto; cursor: pointer; color: #94a3b8; font-size: 22px; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .modal-head .x:hover { background: #f1f5f9; }
  .modal-body { padding: 4px 22px 18px; overflow-y: auto; flex: 1; }
  .modal-foot { padding: 14px 22px; display: flex; align-items: center; gap: 0; justify-content: flex-end; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: #334155; margin-bottom: 6px; }
  .field label .opt { color: #94a3b8; font-weight: 400; }
  .field input, .field select, .field textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; background: #f8fafc; }
  .field textarea { min-height: 84px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: #a5b4fc; background: #fff; }

  .icon-row { display: flex; align-items: center; gap: 14px; }
  .icon-box { width: 66px; height: 66px; border: 1.5px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #cbd5e1; flex-shrink: 0; }
  .up-btn { border: 1px solid #e2e8f0; background: #fff; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; gap: 6px; }
  .icon-hint { font-size: 12px; color: #94a3b8; }
  .callout-modal { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 8px; padding: 10px 12px; font-size: 12.5px; color: #4338ca; line-height: 1.6; margin: 4px 0 2px; }
  .auth-note { font-size: 12px; color: #64748b; background: #f8fafc; border-left: 3px solid #a5b4fc; padding: 7px 10px; border-radius: 4px; line-height: 1.6; }

  .kv { display: grid; grid-template-columns: 1fr 1fr 32px; gap: 10px; align-items: center; margin-bottom: 8px; }
  .kv.single { grid-template-columns: 1fr 32px; }
  .kv .del { color: #ef4444; cursor: pointer; text-align: center; font-size: 16px; }
  .add-line { border: 1px solid #e2e8f0; background: #fff; border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; display: inline-flex; gap: 6px; color: #475569; }

  .save-split { display: inline-flex; }
  .save-split .s1 { background: #6366f1; color: #fff; border: none; border-radius: 8px 0 0 8px; padding: 9px 20px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .save-split .s2 { background: #4f46e5; color: #fff; border: none; border-left: 1px solid rgba(255,255,255,.25); border-radius: 0 8px 8px 0; padding: 9px 12px; cursor: pointer; }

  .toast { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; z-index: 40; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="page-label">
  <span class="badge-num">M</span>
  <span class="badge-title">WorkHub Studio · AI 工厂「MCP」高保真原型</span>
  <span class="badge-desc">内置 MCP 小卡片 · 右上角添加 · STDIO/SSE/HTTP 三种传输类型 · 默认图标 + 上传</span>
</div>

<div class="app">
  <div class="topbar">
    <div class="logo"><span class="logo-icon">W</span>WorkHub Studio</div>
    <span class="tenant-select">🏢 网易－效率工程部 ▾</span>
    <div class="right"><span class="avatar">青</span></div>
  </div>

  <div class="sidebar">
    <div class="side-title">AI 工厂</div>
    <div class="side-item">💬 对话</div>
    <div class="side-item">🤖 Bots</div>
    <div class="side-item">🧠 Agents</div>
    <div class="side-item">👥 Teams</div>
    <div class="side-item">📖 知识</div>
    <div class="side-item">🧩 记忆</div>
    <div class="side-item">🔧 工具</div>
    <div class="side-item active">🔌 MCP</div>
    <div class="side-item">💾 资源库</div>
    <div class="side-item">💬 会话</div>
    <div class="side-item">⚡ 自动化任务</div>
  </div>

  <div class="main" id="main"></div>

  <div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
  <div class="toast" id="toast"></div>
</div>

<script>
/* ---------------- 内置 MCP ---------------- */
const mcps = [
  { name:"POPO 云空间", ico:"📁", bg:"#e0f2fe", desc:"读写 POPO 云文档、表格、多维表与文件夹" },
  { name:"POPO 日程", ico:"📅", bg:"#ede9fe", desc:"查询日程、预约会议与会议室、节假日查询" },
  { name:"POPO 任务", ico:"✅", bg:"#dcfce7", desc:"创建 / 更新任务与子任务、查询任务列表" },
  { name:"易协作", ico:"🤝", bg:"#fef3c7", desc:"协同文档、项目与流程审批的接入" },
  { name:"KM 知识管理", ico:"📚", bg:"#e0e7ff", desc:"搜索知识、阅读文章，与 KM 系统交互" },
  { name:"网易邮箱", ico:"✉️", bg:"#eef2f7", desc:"读取邮件、搜索往来和发送邮件" },
  { name:"GitHub", ico:"🐙", bg:"#f1f5f9", desc:"查询代码、Issue、PR 和仓库信息" },
  { name:"Figma", ico:"🎨", bg:"#fae8ff", desc:"读取设计文件、页面和组件信息" },
  { name:"CodeMaker", ico:"⟨⟩", bg:"#e0f2fe", desc:"调用研发代码生成与分析能力" },
  { name:"北大法宝", ico:"⚖️", bg:"#f1f5f9", desc:"检索法律法规、案例与司法解释" },
  { name:"天眼查", ico:"🏢", bg:"#eef2f7", desc:"查询企业、股东和工商风险信息" }
];


const main = document.getElementById("main");
const overlay = document.getElementById("overlay");
const modal = document.getElementById("modal");

let form = { name:"", transport:"STDIO", icon:"🔌", note:"", command:"", url:"", args:[], envs:[], headers:[] };

function render(){
  main.innerHTML = `
    <div class="main-header">
      <span class="main-title">MCP</span>
      <button class="btn primary" style="margin-left:auto;" onclick="openAdd()">＋ 添加 MCP</button>
    </div>
    <div class="main-sub">将平台可用的 MCP 服务统一管理起来，供 Agent 链接外部系统调用</div>
    <div class="grid">
      ${mcps.map((m,i)=>`
        <div class="mcp-card">
          <div class="mcp-ico" style="background:${m.bg};">${m.ico}</div>
          <div class="mcp-info">
            <div class="mcp-name">${m.name}</div>
            <div class="mcp-desc">${m.desc}</div>
          </div>
        </div>`).join("")}
    </div>`;
}

/* ---------------- 添加 MCP ---------------- */
let editIdx = -1;
function openAdd(){
  editIdx = -1;
  form = { name:"", transport:"STDIO", auth:"OAuth", icon:"🔌", note:"", command:"", url:"", args:[""], oauthClient:"" };
  overlay.classList.add("show");
  renderModal();
}
function closeModal(){ overlay.classList.remove("show"); }
function setField(k,v){ form[k]=v; }
function setTransport(v){ form.transport=v; renderModal(); }

function renderModal(){
  const t = form.transport;
  const connect = (t==="STDIO") ? stdioFields() : httpLikeFields(t);
  const dynamic = connect + authFields();
  modal.innerHTML = `
    <div class="modal-head"><span class="mt">${editIdx>=0?"编辑 MCP":"MCP 配置"}</span><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">
      <div class="row2">
        <div class="field"><label>服务器名称</label><input placeholder="e.g., My Custom Server" value="${form.name}" oninput="setField('name',this.value)"></div>
        <div class="field"><label>传输类型</label>
          <select onchange="setTransport(this.value)">
            <option ${t==="STDIO"?"selected":""}>STDIO</option>
            <option ${t==="SSE"?"selected":""}>SSE</option>
            <option ${t==="HTTP"?"selected":""}>HTTP</option>
          </select>
        </div>
      </div>

      <div class="callout-modal">🔑 后台仅声明<b>鉴权方式</b>，<b>不填写终端用户的具体凭据</b>（Token / Key）。凭据由 C 端用户各自授权 / 填写，或 B 端管理员配置租户统一凭据，绑定到用户 / 租户维度。</div>

      <div class="field">
        <label>图标</label>
        <div class="icon-row">
          <div class="icon-box" id="iconBox">${form.icon}</div>
          <div>
            <button class="up-btn" onclick="toast('选择本地图片上传（PNG/JPG，≤1MB，推荐 256×256）')">⬆ 上传 ▾</button>
            <div class="icon-hint" style="margin-top:6px;">PNG 或 JPG，最大 1 MB。推荐尺寸 256×256 像素。未上传时使用默认图标。</div>
          </div>
        </div>
      </div>

      <div class="field"><label>备注 <span class="opt">（可选）</span></label>
        <textarea placeholder="提供 MCP 文档或说明，以告知平台如何及何时使用此 MCP" oninput="setField('note',this.value)">${form.note}</textarea>
      </div>

      ${dynamic}
    </div>
    <div class="modal-foot">
      <span class="save-split">
        <button class="s1" onclick="doSave()">保存</button>
        <button class="s2" onclick="toast('保存并添加下一个')">▾</button>
      </span>
    </div>`;
}

function stdioFields(){
  return `
    <div class="field"><label>命令</label><input placeholder="e.g., python, node, ./script.sh" value="${form.command}" oninput="setField('command',this.value)"></div>
    <div class="field">
      <label>参数</label>
      ${form.args.map((a,i)=>`<div class="kv single"><input placeholder="输入参数值" value="${a}" oninput="form.args[${i}]=this.value"><span class="del" onclick="delArg(${i})">🗑</span></div>`).join("")}
      <span class="add-line" onclick="addArg()">＋ 添加参数</span>
    </div>
    <div class="auth-note">⚠️ STDIO 靠本地进程运行，SaaS 可用性待研发评估，本期先保留。</div>`;
}
function httpLikeFields(t){
  const ph = t==="SSE" ? "https://mcp.yourserver.com/sse" : "https://mcp.yourserver.com/mcp";
  return `
    <div class="field"><label>服务器 URL</label><input placeholder="${ph}" value="${form.url}" oninput="setField('url',this.value)"></div>`;
}
function authFields(){
  const a = form.auth;
  const map = {
    "无鉴权":"公开 MCP，无需凭据，直接调用。",
    "OAuth 授权":"C 端用户点「连接」跳授权页各自授权（token 存用户维度）；后台仅需 OAuth 应用信息。",
    "API Key":"C 端用户在前台各自填写自己的 API Key（存用户维度）。",
    "租户统一凭据":"B 端管理员配置一份统一凭据（租户共享），员工无感调用，平台按员工身份记录调用审计。"
  };
  const oauthApp = a==="OAuth 授权"
    ? `<div class="field"><label>OAuth 应用信息 <span class="opt">（应用级，非用户凭据）</span></label><input placeholder="client_id（如：Iv1.xxx）" value="${form.oauthClient}" oninput="setField('oauthClient',this.value)"></div>` : "";
  return `
    <div class="field"><label>鉴权方式</label>
      <select onchange="setField('auth',this.value);renderModal()">
        ${["无鉴权","OAuth 授权","API Key","租户统一凭据"].map(x=>`<option ${a===x?"selected":""}>${x}</option>`).join("")}
      </select>
    </div>
    ${oauthApp}
    <div class="auth-note">${map[a]||""}</div>`;
}

function pickIcon(ic){ form.icon=ic; renderModal(); }
function addArg(){ form.args.push(""); renderModal(); }
function delArg(i){ form.args.splice(i,1); renderModal(); }

function doSave(){
  const name = (form.name||"").trim() || "自定义 MCP";
  const desc = form.note.trim() || (form.transport + " · " + form.auth);
  const rec = { name, ico:form.icon, bg:"#eef2ff", desc, transport:form.transport, auth:form.auth, command:form.command, url:form.url, args:form.args };
  mcps.push(rec); toast("已添加 MCP：" + name);
  closeModal();
  render();
}

let toastTimer;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2600); }

render();
</script>
</body>
</html>
