function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function boundAgentCount(kbId){ return agents.filter(a=>a.boundKbs.includes(kbId)).length; }
// 资料类型：本地文件（图片/视频/文件）在容器内展示；云文档/KM/网络链接点击打开原链接
function isLinkDoc(d){ return d.type==='POPO文档' || d.type==='KM文章' || d.type==='网络链接'; }
function docIcon(d){
  if(isLinkDoc(d)) return d.type==='KM文章'?'📗': d.type==='网络链接'?'🔗':'📘';
  if(d.kind==='image') return '🖼️'; if(d.kind==='video') return '🎬'; return '📄';

// ============ 外壳 ============
function shell(inner){
  const groups = [
    { title:'AI 工厂', open:true, items:[
      ['对话','💬'],['Bots','🤖'],['Agents','🧊'],['Teams','👥'],['Models','🗄️'],
      ['Prompts','📋'],['Skills','🧩'],['记忆','🧠'],['知识','📚'],['工具','🔧'],['会话','💬'] ] },
    { title:'接入管理', open:true, items:[ ['应用管理','🗂️'],['Channel','🔗'],['Secret Key','🔑'],['权限管理','🛡️'] ] },
    { title:'组织管理', open:false, items:[] },
    { title:'系统设置', open:false, items:[] },
  ];
  const sidebar = groups.map(g=>{
    const head = `<div class="sb-group-head">${g.title}<span class="chev">${g.open?'⌃':'⌄'}</span></div>`;
    if(!g.open || !g.items.length) return head;
    const items = g.items.map(([m,icon])=>{
      let active = (m==='知识' && (state.view==='kbList'||state.view==='kbDetail'))
        || (m==='Agents' && (state.view==='agents'||state.view==='agentDetail'));
      let onclick = m==='知识'?"go('kbList')": m==='Agents'?"go('agents')":"toast('该菜单为占位，聚焦知识管理流程')";
      return `<div class="sidebar-item ${active?'active':''}" onclick="${onclick}"><span class="sb-ic">${icon}</span>${m}</div>`;
    }).join('');
    return head + items;
  }).join('');
  return `
  <div class="topbar">
    <div class="logo"><span class="logo-icon">F</span>Fabric</div>
    <div class="tenant-select" onclick="toast('当前租户：POPO')">📓 POPO 租户 ▾</div>
    <div class="topbar-right">
      <div class="link-btn" onclick="go('chat')">🔎 C 端对话预览</div>
      <span>🔔</span><div class="avatar">振</div>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">${sidebar}</div>
    <div class="content">${inner}</div>
  </div>`;
}

// ============ 路由 ============
function go(view, kbId){ state.view = view; if(kbId) state.kbId = kbId; if(view==='kbDetail') state.kbTab='docs'; render(); }

function render(){
  let inner = '';
  if(state.view==='kbList') inner = renderKbList();
  else if(state.view==='kbDetail') inner = renderKbDetail();
  else if(state.view==='agents') inner = renderAgents();
  else if(state.view==='agentDetail') inner = renderAgentDetail();
  else if(state.view==='chat') inner = renderChat();
  document.getElementById('app').innerHTML = shell(inner);
}

      <div class="wiki-group">
        <div class="wg-title">✨ ${g} <span class="wg-count">${k.wikiTree[g].length}</span></div>
        ${k.wikiTree[g].map(n=>`<div class="wiki-node" style="cursor:pointer" onclick="openWikiNode('${k.id}','${esc(g)}','${esc(n)}')">${esc(n)}</div>`).join('')}

      <div style="margin-top:14px;font-size:12px;color:#94a3b8">Wiki 间关联（利于关联检索）：</div>
      <div>${(keys.length?['publicVar','引用回复','IP 溯源','长连接','机器人拉群']:[]).map(r=>`<span class="rel-chip">🔗 ${r}</span>`).join('')}</div>
    </div>`;
  return `
  <div class="breadcrumb"><a onclick="go('kbList')">知识</a><span class="sep">/</span>${esc(k.name)}</div>
  <div class="page-header">
    <div>
      <div class="page-title">📚 ${esc(k.name)}
        ${k.source==='cuser'?'<span class="tag purple" style="font-size:12px">C 端用户创建</span>':'<span class="tag cyan" style="font-size:12px">配置者创建</span>'}</div>
      <div class="page-subtitle">${esc(k.desc)}</div>

    <div style="display:flex;gap:8px">
      <button class="btn btn-secondary" onclick="openEditKb('${k.id}')">编辑</button>

  </div>
  <div class="detail-card">
    <div class="info-grid">
      <div class="k">归属用户</div><div>${esc(k.owner)}</div>
      <div class="k">分类</div><div>${k.cat?`<span class="cat-cell" onclick="openSetCategory('${k.id}')"><span class="dot" style="background:${catColor(k.cat)}"></span>${esc(k.cat)}</span>`:'<span class="link-btn" onclick="openSetCategory(\''+k.id+'\')">＋ 设置分类</span>'}</div>
      <div class="k">展示标签</div><div>${(k.tags&&k.tags.length)?k.tags.map(t=>`<span class="show-tag">${esc(t)}</span>`).join(' '):'<span style="color:#cbd5e1">—</span>'}</div>
      <div class="k">可见性</div><div><span class="link-btn" onclick="openVisibility('${k.id}')">${(k.visibility&&(k.visibility.depts.length||k.visibility.users.length||k.visibility.channels.length))?'已配置 · 点击编辑':'未配置 · 点击设置'}</span></div>
      <div class="k">Wiki 状态</div><div><span class="tag ${WIKI_CLASS[k.wiki]}">${WIKI_LABEL[k.wiki]}</span></div>
      <div class="k">被 Agent 绑定</div><div>${boundAgentCount(k.id)} 个（${agents.filter(a=>a.boundKbs.includes(k.id)).map(a=>a.name).join('、')||'暂无'}）</div>

// 查看资料：链接类打开原链接；本地文件在容器内预览
function openDoc(kbId, i){
  const k = kbs.find(x=>x.id===kbId); const d = k.docs[i];
  if(isLinkDoc(d)){
    const url = d.url || 'https://docs.popo.netease.com';
    toast('打开原链接：'+url);
    window.open(url, '_blank');
    return;
  }
  let viewer = '';
  if(d.kind==='image'){
    viewer = `<div style="background:#0f172a;border-radius:10px;height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e2e8f0"><div style="font-size:48px">🖼️</div><div style="margin-top:10px">${esc(d.name)}</div><div style="font-size:12px;color:#64748b;margin-top:4px">图片预览（演示占位）</div></div>`;
  } else if(d.kind==='video'){
    viewer = `<div style="background:#0f172a;border-radius:10px;height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e2e8f0;position:relative"><div style="width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:28px">▶️</div><div style="margin-top:12px">${esc(d.name)}</div><div style="font-size:12px;color:#64748b;margin-top:4px">视频播放器（演示占位）</div></div>`;
  } else {
    viewer = `<div style="border:1px solid #e5e7eb;border-radius:10px;padding:26px;text-align:center"><div style="font-size:48px">📄</div><div style="margin-top:10px;font-weight:600">${esc(d.name)}</div><div style="font-size:12px;color:#94a3b8;margin-top:4px">本地文件 · 已进入知识本解析</div><button class="btn btn-secondary btn-sm" style="margin-top:14px" onclick="toast('下载（演示）')">⬇️ 下载原文件</button></div>`;
  }
  const m = document.getElementById('modal');
  m.innerHTML = `
    <div class="modal-header"><span class="title">${docIcon(d)} ${esc(d.name)}</span><span class="close" onclick="closeAll()">×</span></div>
    <div class="modal-body">${viewer}
      <div style="margin-top:14px;font-size:12px;color:#94a3b8">类型：${d.type} · 本地文件（图片 / 视频 / 文件）在此容器内展示；云文档 / KM / 链接类点击直接打开原链接。</div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeAll()">关闭</button></div>`;
  showModal();
}

// 查看 Wiki 节点详情
function openWikiNode(kbId, group, node){
  const k = kbs.find(x=>x.id===kbId);
  let body = '';
  if(k.facts && k.facts[node]) body = esc(k.facts[node]);
  else body = `「${esc(node)}」的结构化知识摘要（由知识本从资料中自动抽取，演示占位）。`;
  const related = (k.wikiTree[group]||[]).filter(n=>n!==node).slice(0,4);
  const m = document.getElementById('modal');
  m.innerHTML = `
    <div class="modal-header"><span class="title">✨ ${esc(node)}</span><span class="close" onclick="closeAll()">×</span></div>
    <div class="modal-body">
      <div style="font-size:12px;color:#94a3b8;margin-bottom:8px">所属分类：${esc(group)}</div>
      <div style="background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:14px;line-height:1.7">${body}</div>
      <div style="margin-top:14px;font-size:12px;color:#94a3b8">关联节点（利于关联检索）：</div>
      <div>${related.length?related.map(r=>`<span class="rel-chip" style="cursor:pointer" onclick="openWikiNode('${kbId}','${esc(group)}','${esc(r)}')">🔗 ${esc(r)}</span>`).join(''):'<span style="color:#94a3b8;font-size:12px">暂无</span>'}</div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" onclick="closeAll()">关闭</button></div>`;
  showModal();
}

function setEditTab(t){

function setSrcTab(s){

  openKbDrawer(state.editingKb?'编辑知识本':'新建知识本', state.editingKb?kbs.find(x=>x.id===state.editingKb):null);

function renderDraftDocs(){
  return state.draftDocs.map((d,i)=>`<div class="doc-chip">📄 ${esc(d.name)} <span class="tag gray">${d.type}</span><span class="rm" onclick="rmDraftDoc(${i})">×</span></div>`).join('');
}
function addDraftDoc(){
  const map = {'云空间':['季度规划.docx','项目周报'],'本地文件':['需求说明.pdf','数据表.xls'],'网络链接':['某技术博客','某公众号文章'],'KM 文章':['接口规范KM','FAQ汇总KM']};
  const pool = map[state.srcTab]; const pick = pool[Math.floor(Math.random()*pool.length)];
  const typeMap={'云空间':'POPO文档','本地文件':'本地文件','网络链接':'网络链接','KM 文章':'KM文章'};
  state.draftDocs.push({ name: pick, type: typeMap[state.srcTab] });
  document.getElementById('draftDocs').innerHTML = renderDraftDocs();
  toast('已添加资料（演示）');
}
function rmDraftDoc(i){ state.draftDocs.splice(i,1); document.getElementById('draftDocs').innerHTML = renderDraftDocs(); }

function renderDraftWiki(){
  const keys = Object.keys(state.draftWiki||{});
  if(!keys.length) return '<div style="font-size:12px;color:#94a3b8;padding:8px 0">Wiki 已全部删除 / 暂无 Wiki</div>';
  return `<div style="text-align:right;margin-bottom:6px"><span class="link-btn danger" onclick="clearDraftWiki()">删除整个 Wiki</span></div>` + keys.map(g=>`
    <div style="border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px">✨ ${esc(g)} <span style="font-size:11px;color:#94a3b8">${state.draftWiki[g].length}</span>
        <span class="link-btn danger" style="margin-left:auto;font-size:12px" onclick="rmWikiGroup('${esc(g)}')">删除该分类</span></div>
      ${state.draftWiki[g].map((n,ni)=>`<div class="doc-chip" style="padding:5px 10px;margin-top:6px">• ${esc(n)}<span class="rm" onclick="rmWikiNode('${esc(g)}',${ni})">×</span></div>`).join('')}
    </div>`).join('');
}
function rmWikiNode(g, ni){
  state.draftWiki[g].splice(ni,1);
  if(!state.draftWiki[g].length) delete state.draftWiki[g];
  document.getElementById('draftWiki').innerHTML = renderDraftWiki();
}
function rmWikiGroup(g){ delete state.draftWiki[g]; document.getElementById('draftWiki').innerHTML = renderDraftWiki(); }
function clearDraftWiki(){ state.draftWiki={}; document.getElementById('draftWiki').innerHTML = renderDraftWiki(); toast('已删除整个 Wiki（不影响资料）'); }

function renderTagPick(){
  return DISPLAY_TAGS.map(t=>{
    const on = (state.draftTags||[]).includes(t);
    return `<span class="tag-opt ${on?'on':''}" onclick="toggleTag('${esc(t)}')">${on?'✓ ':''}${esc(t)}</span>`;

function toggleTag(t){
  state.draftTags = state.draftTags||[];
  const i = state.draftTags.indexOf(t);
  if(i>=0) state.draftTags.splice(i,1); else state.draftTags.push(t);
  const el = document.getElementById('tagPick'); if(el) el.innerHTML = renderTagPick();
}

function saveVisibility(id){
  const k = kbs.find(x=>x.id===id);
  const sp = s => s.split(/[、,，]/).map(x=>x.trim()).filter(Boolean);
  k.visibility = { depts: sp(document.getElementById('visDept').value), users: sp(document.getElementById('visUser').value), channels: sp(document.getElementById('visCh').value) };
  closeAll(); render(); toast('可见性已保存');
}

function saveKb(){
  const name = document.getElementById('kbName').value.trim();
  const desc = document.getElementById('kbDesc').value.trim();
  if(!name){ toast('请填写知识本名称'); return; }
  if(state.editingKb){
    const k = kbs.find(x=>x.id===state.editingKb); const wasC = k.source==='cuser';
    k.name=name; k.desc=desc; k.docs=state.draftDocs.slice();
    k.wikiTree = JSON.parse(JSON.stringify(state.draftWiki||{}));
    k.tags = (state.draftTags||[]).slice();
    k.updatedBy = '张振'; k.updatedAt = '2026-07-02';
    if(k.wiki==='done' && !Object.keys(k.wikiTree).length){ /* Wiki 被清空，保留状态，详情显示暂无 */ }
    closeAll(); render();
    toast(wasC ? '已更新，未通知 C 端用户' : '已保存');
  } else {
    if(!state.draftDocs.length){ toast('请至少添加一条资料'); return; }
    const id = 'kb'+(Date.now()%100000);
    kbs.unshift({ id, name, desc, source:'admin', owner:'张振', wiki:'processing', createdAt:'2026-07-02', updatedBy:'张振', updatedAt:'2026-07-02', cat:null, tags:(state.draftTags||[]).slice(), visibility:{depts:[],users:[],channels:[]}, docs: state.draftDocs.slice(), wikiTree:{}, facts:{} });
    closeAll(); go('kbList');
    toast('知识本已创建，Wiki 生成中');
    setTimeout(()=>{ const k=kbs.find(x=>x.id===id); if(k){ k.wiki='done'; k.wikiTree={'原文摘要':k.docs.map(d=>d.name),'术语解释':['示例术语']}; if(state.view==='kbList'||state.view==='kbDetail') render(); toast('Wiki 已生成'); } }, 2600);
  }
}

  const k = kbs.find(x=>x.id===id);
  const isC = k.source==='cuser';
  const bc = boundAgentCount(id);
  const m = document.getElementById('modal'); m.classList.add('sm');
  m.innerHTML = `
    <div class="modal-header"><span class="title">删除知识本</span><span class="close" onclick="closeAll()">×</span></div>
    <div class="modal-body">
      <p>确定删除「<b>${esc(k.name)}</b>」？此操作不可恢复。</p>
      ${bc? `<div class="callout-strip" style="margin-top:12px">⚠️ 该知识本正被 ${bc} 个 Agent 绑定，删除后将从这些 Agent 的知识库中移除。</div>`:''}
      ${isC? `<div class="callout-strip" style="margin-top:12px;background:#fef3c7;border-color:#fcd34d;color:#92400e">该知识本由 C 端用户「${esc(k.owner)}」创建，删除后<b>不通知</b>该用户（与 Skills 一致）。</div>`:''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAll()">取消</button>
      <button class="btn btn-danger-solid" onclick="confirmDeleteKb('${id}')">删除</button>
    </div>`;
  showModal();
}
function confirmDeleteKb(id){
  const k = kbs.find(x=>x.id===id); const isC = k.source==='cuser';
  agents.forEach(a=> a.boundKbs = a.boundKbs.filter(x=>x!==id));
  kbs = kbs.filter(x=>x.id!==id);
  closeAll();
  if(state.view==='kbDetail') go('kbList'); else render();
  toast(isC ? '已删除，未通知 C 端用户' : '已删除');
}

let bindDraft = [];
const AGENT_TABS = ['基础信息','内置工具','Prompt 绑定','Skill 绑定','MCP 绑定','知识绑定'];
function openAgentDetail(id){
  const a = agents.find(x=>x.id===id);
  state.view='agentDetail'; state.agentId=id; state.agentTab='知识绑定'; state.bindSearch='';
  bindDraft = a.boundKbs.slice();
  render();
}
function setAgentTab(t){ state.agentTab=t; render(); }

function renderAgentDetail(){
  const a = agents.find(x=>x.id===state.agentId);
  const tabs = AGENT_TABS.map(t=>`<div class="tab ${state.agentTab===t?'active':''}" onclick="setAgentTab('${t}')">${t}</div>`).join('');
  let body = '';
  if(state.agentTab==='知识绑定') body = renderKnowledgeBind();
  else body = `<div class="empty">「${state.agentTab}」为占位（保持 Fabric 现有配置规范），本原型聚焦「知识绑定」。</div>`;
  return `
  <div class="breadcrumb"><a onclick="go('agents')">← 返回 Agents</a></div>

  <div class="tabs">${tabs}</div>

function renderKnowledgeBind(){
  return `
  <div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px">
    <div class="bind-wrap">
      <div class="bind-col left">
        <input class="bind-searchbox" placeholder="请输入" value="${esc(state.bindSearch||'')}" oninput="onBindSearch(this.value)">
        <div class="bind-bar"><span>共 <b id="bindTotal">${filteredBindKbs().length}</b> 项</span><span class="act" onclick="bindSelectAll()">全选</span></div>
        <div class="bind-list" id="bindLeft">${renderBindLeft()}</div>
      </div>
      <div class="bind-col right">
        <div class="bind-bar"><span>共 <b id="bindCount">${bindDraft.length}</b> 项</span><span class="act" onclick="bindClear()">清空</span></div>
        <div class="bind-list" id="bindRight">${renderBindRight()}</div>
      </div>
    </div>
    <div style="margin-top:16px"><button class="btn btn-primary" onclick="saveBind('${state.agentId}')">🖫 保存绑定</button></div>
  </div>`;
}
function filteredBindKbs(){
  const q = (state.bindSearch||'').trim();
  return kbs.filter(k=> k.wiki!=='fail' && (!q || k.name.includes(q) || (k.desc||'').includes(q)));
}
function renderBindLeft(){
  const list = filteredBindKbs();
  if(!list.length) return '<div class="empty">无匹配知识本</div>';
  return list.map(k=>{
    const on = bindDraft.includes(k.id);
    return `<div class="bind-item ${on?'on':''}" onclick="toggleBind('${k.id}')">
      <div class="bind-cb">${on?'✓':''}</div>
      <div><div class="bi-name">📚 ${esc(k.name)}${k.wiki==='processing'?' <span class="tag amber" style="font-size:10px">Wiki生成中</span>':''}</div><div class="bi-desc">${esc(k.desc)}</div></div>
    </div>`;
  }).join('');
}
function renderBindRight(){
  if(!bindDraft.length) return '<div class="empty">从左侧选择知识本，选中后在此展示</div>';
  return bindDraft.map(id=>{
    const k = kbs.find(x=>x.id===id); if(!k) return '';
    return `<div class="sel-item"><div class="bi-name" style="font-weight:500">${esc(k.name)}</div><span class="si-x" onclick="toggleBind('${id}')">×</span></div>`;
  }).join('');
}
function refreshBind(){
  document.getElementById('bindLeft').innerHTML = renderBindLeft();
  document.getElementById('bindRight').innerHTML = renderBindRight();
  document.getElementById('bindCount').textContent = bindDraft.length;
  const bt = document.getElementById('bindTotal'); if(bt) bt.textContent = filteredBindKbs().length;
}
function onBindSearch(v){ state.bindSearch=v; document.getElementById('bindLeft').innerHTML = renderBindLeft(); const bt=document.getElementById('bindTotal'); if(bt) bt.textContent=filteredBindKbs().length; }
function toggleBind(id){
  if(bindDraft.includes(id)) bindDraft = bindDraft.filter(x=>x!==id); else bindDraft.push(id);
  refreshBind();
}
function bindSelectAll(){ filteredBindKbs().forEach(k=>{ if(!bindDraft.includes(k.id)) bindDraft.push(k.id); }); refreshBind(); }
function bindClear(){ bindDraft = []; refreshBind(); }
function saveBind(agentId){
  const a = agents.find(x=>x.id===agentId); a.boundKbs = bindDraft.slice();
  toast('知识绑定已保存'); go('agents');
}

// ============ C 端对话检索演示 ============
function renderChat(){
  const a = agents.find(x=>x.id===chat.agentId);
  const boundNames = a.boundKbs.map(id=>{const k=kbs.find(x=>x.id===id);return k?k.name:'';}).filter(Boolean);
  const msgs = chat.messages.map(m=>`<div class="msg ${m.from==='me'?'me':'bot'}">${esc(m.text)}</div>`).join('');
  let dbg = '';
  if(chat.lastRetrieval){
    const r = chat.lastRetrieval;
    dbg = `
      <div class="step">① 用户提问：<code>${esc(r.q)}</code></div>
      <div class="step">② Agent Runtime 取绑定知识本 <code>notebook_ids = [${r.ids.join(', ')||'空'}]</code></div>
      <div class="step">③ 在 ${r.ids.length} 个知识本内语义检索，跨本重排 / 去重 → 命中 ${r.hits} 条片段</div>
      <div class="step">④ 片段作为上下文喂给模型生成答案</div>
      <div class="step">⑤ 输出答案给用户 <span class="muted">（不含引用回链 / 来源信息）</span></div>`;
  } else {
    dbg = '<div class="muted">在左侧发送一条提问，这里会展示检索链路。<br><br>试试问：<br>· publicVar 有字数限制吗<br>· 引用回复会 @ 谁</div>';
  }
  return `
  <div class="page-header"><div>
    <div class="page-title">🔎 C 端对话预览</div>
    <div class="page-subtitle">模拟 C 端用户与投放的 Agent 对话，观察知识本检索链路（右侧演示面板仅调试用，C 端不可见）</div>
  </div></div>
  <div style="margin-bottom:14px;display:flex;align-items:center;gap:10px">
    <span style="font-size:13px;color:#475569">当前 Agent：</span>
    <select class="filter-select" onchange="switchChatAgent(this.value)">
      ${agents.map(x=>`<option value="${x.id}" ${x.id===chat.agentId?'selected':''}>${esc(x.name)}</option>`).join('')}
    </select>
    <span style="font-size:12px;color:#94a3b8">绑定知识本：${boundNames.join('、')||'未绑定（将走通用作答）'}</span>
  </div>
  <div class="chat-wrap">
    <div class="phone">
      <div class="phone-top"><div class="pa">🤖</div><div><div style="font-weight:700">${esc(a.name)}</div><div style="font-size:11px;opacity:0.85">在线</div></div></div>
      <div class="chat-body" id="chatBody">${msgs}</div>
      <div class="chat-input">
        <input id="chatInput" placeholder="输入你的问题…" onkeydown="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">发送</button>
      </div>
    </div>
    <div class="debug"><h4>🔧 检索链路演示面板</h4>${dbg}</div>
  </div>`;
}
function switchChatAgent(id){ chat.agentId=id; chat.messages=[{from:'bot',text:'你好，我是'+agentName(id)+'，有什么可以帮你？'}]; chat.lastRetrieval=null; render(); }

function sendChat(){
  const inp = document.getElementById('chatInput'); const q = inp.value.trim(); if(!q) return;
  chat.messages.push({ from:'me', text:q });
  const a = agents.find(x=>x.id===chat.agentId);
  const ids = a.boundKbs.slice();
  // 简单关键词命中
  let answer = '', hits = 0;
  if(!ids.length){
    answer = '（该 Agent 未绑定知识本，走模型通用能力）暂时无法从知识库中给出确切依据，建议补充相关知识本。';
  } else {
    let matched = null;
    for(const id of ids){
      const k = kbs.find(x=>x.id===id); if(!k) continue;
      for(const key of Object.keys(k.facts)){
        if(q.includes(key)){ matched = k.facts[key]; hits++; }
      }
    }
    if(matched){ answer = matched; }
    else { answer = '在已绑定的知识本中未检索到明确依据，以下为通用回答：请提供更具体的问题，或联系管理员补充知识。'; }
  }
  chat.lastRetrieval = { q, ids, hits: hits||0 };
  chat.messages.push({ from:'bot', text: answer });
  render();
  setTimeout(()=>{ const b=document.getElementById('chatBody'); if(b) b.scrollTop=b.scrollHeight; },30);
}

// ============ 弹层控制 ============
function showDrawer(){ document.getElementById('overlay').classList.add('show'); document.getElementById('drawer').classList.add('show'); }
function showModal(){ document.getElementById('overlay').classList.add('show'); document.getElementById('modal').classList.add('show'); }
function closeAll(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('drawer').classList.remove('show');
  const m = document.getElementById('modal'); m.classList.remove('show'); m.classList.remove('sm');
}
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast'); t.innerHTML = '✓ '+msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2000);
}

render();
</script>
</body>
</html>
