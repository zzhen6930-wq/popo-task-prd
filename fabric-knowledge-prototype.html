<script>
/* ---------------- data：当前租户下的知识本（C/B 统一，不区分） ---------------- */
/* C 端：前台创建 Agent 绑定知识时自动生成，名称默认「Agent 名称的知识本」 */
/* B 端：后台自行创建并命名 */
const kbs = [
  { id:"KB-1024", name:"我的研究助手的知识本", user:"青远（张振）", agent:"我的研究助手", updated:"2026-07-23 15:08",
    docs:[
      { n:"SKILL_副本.md", ext:"md", c:"#0ea5e9", from:"local", t:"2026-07-23 15:08" },
      { n:"飞书CLI调研&POPO CLI PRD方案.pdf", ext:"pdf", c:"#ef4444", from:"local", t:"2026-07-23 15:02" },
      { n:"开放平台问题测试集", ext:"doc", c:"#2563eb", from:"cloud", t:"2026-07-22 11:40" },
      { n:"Manus AI 研究（19 来源）", ext:"本", c:"#059669", from:"book", t:"2026-07-22 11:30" }
    ] },
  { id:"KB-1025", name:"周报小助手的知识本", user:"青远（张振）", agent:"周报小助手", updated:"2026-07-21 10:20",
    docs:[
      { n:"周报模板.docx", ext:"doc", c:"#2563eb", from:"local", t:"2026-07-21 10:20" },
      { n:"团队 OKR 说明", ext:"doc", c:"#2563eb", from:"cloud", t:"2026-07-20 09:00" }
    ] },
  { id:"KB-1026", name:"群运维知识库", user:"sangchen@corp.netease.com", agent:null, updated:"2026-07-19 14:00",
    docs:[
      { n:"群运维 SOP.pdf", ext:"pdf", c:"#ef4444", from:"local", t:"2026-07-19 14:00" }
    ] }
];

const wikiTree = [
  { g:"原文摘要", cnt:9, open:true, items:["POPO IM Skill 配置文件","开放平台问题测试集","Manus AI 研究","飞书CLI调研&POPO CLI PRD方案.pdf"] },
  { g:"人物与事物", cnt:7, open:false, items:[] },
  { g:"术语解释", cnt:17, open:false, items:[] },
  { g:"待解问题", cnt:19, open:false, items:[] }
];

const notebooks = [
  { id:"n1", name:"未命名的笔记本", cnt:0, by:"青远", date:"7月8, 2026" },
  { id:"n2", name:"The Rise of Manus AI: Evolution of Autonomous Digital Agents", cnt:19, by:"青远", date:"2月2, 2026" },
  { id:"n3", name:"ClawdBot Agent Gateway Product Architecture Overview", cnt:1, by:"张三", date:"1月27, 2026" },
  { id:"n4", name:"Deploying Claudebot: Local and VPS Setup Guide", cnt:1, by:"李四", date:"1月26, 2026" }
];
const cloudDocs = [
  { id:"c1", name:"popo-cli需求集合", by:"青远(张振)" },
  { id:"c2", name:"CLI二期需求", by:"青远(张振)" },
  { id:"c3", name:"POPO CLI 方案PRD", by:"青远(张振)" },
  { id:"cf", name:"📁 CLI 项目文档（文件夹 · 12 篇）", by:"青远(张振)", folder:true }
];

/* ---------------- state ---------------- */
let view = "list";
let curKb = null;
let detailTab = "mat";
let forceEmpty = false;
let flow = { step:0, kbName:"", targetKb:null, way:null, picked:new Set() };

const main = document.getElementById("main");
const overlay = document.getElementById("overlay");
const modal = document.getElementById("modal");

function render(){ view==="list" ? renderList() : renderDetail(); }

/* ---------------- list（知识本维度 · 当前租户）---------------- */
function renderList(){
  const rows = kbs;
  const hasData = rows.length>0 && !forceEmpty;

  let body = `
    <div class="main-header">
      <span class="main-title">知识</span>
      <span class="main-sub">当前租户下的知识本</span>
      <button class="btn primary" style="margin-left:auto;" onclick="openCreate()">＋ 创建知识本</button>
    </div>`;

  if(!hasData){
    body += `
      <div class="empty">
        <div class="ei">📖</div>
        <div class="et">还没有知识本</div>
        <div class="ed">首次进入列表为空。点击「创建知识本」并命名；<br/>创建后进入详情页添加知识，再到 <b>Agent 管理</b> 给 Agent 绑定即可使用。</div>
        <button class="btn primary" onclick="openCreate()">＋ 创建知识本</button>
      </div>`;
    main.innerHTML = body; return;
  }

  body += `
    <div class="toolbar">
      <div class="search-box">🔍 搜索知识本 ID / 名称 / Agent</div>
    </div>
    <div class="card"><table>
      <thead><tr>
        <th style="width:14%">知识本 ID</th>
        <th>知识本名称</th>
        <th>用户</th>
        <th>Agent 名称</th>
        <th>知识数量</th>
        <th>更新时间</th>
        <th style="width:14%">操作</th>
      </tr></thead>
      <tbody>
        ${rows.map(k=>`
          <tr onclick="openDetail('${k.id}')">
            <td><span class="kb-ico">📚</span><span class="kbid">${k.id}</span></td>
            <td><span class="kbname">${k.name}</span></td>
            <td><span class="email">${k.user}</span></td>
            <td>${k.agent?k.agent:`<span class="unbound">未绑定</span>`}</td>
            <td>${k.docs.length}</td>
            <td style="color:#64748b;">${k.updated}</td>
            <td><span class="op" onclick="event.stopPropagation();openDetail('${k.id}')">查看</span><span class="op-sep">·</span><span class="op danger" onclick="event.stopPropagation();delKb('${k.id}')">删除</span></td>
          </tr>`).join("")}
      </tbody>
    </table></div>`;
  main.innerHTML = body; forceEmpty=false;
}

function openDetail(id){ curKb = kbs.find(k=>k.id===id); view="detail"; detailTab="mat"; render(); }
function backList(){ view="list"; render(); }
function switchTab(t){ detailTab=t; render(); }
function delKb(id){ if(confirm("确认删除该知识本？")){ const i=kbs.findIndex(k=>k.id===id); kbs.splice(i,1); render(); toast("已删除知识本"); } }

/* ---------------- detail ---------------- */
function renderDetail(){
  const list = curKb.docs;
  const fromTxt = { book:"知识本", cloud:"云空间", local:"本地文件" };
  let body = `
    <div class="detail-back" onclick="backList()">← 返回知识列表</div>
    <div class="detail-head">
      <span class="kb-ico" style="width:38px;height:38px;font-size:18px;">📚</span>
      <div>
        <div class="main-title" style="font-size:19px;">${curKb.name}</div>
        <div style="font-size:12px;color:#94a3b8;">知识本 ID <span class="kbid">${curKb.id}</span> · 用户 ${curKb.user} · 绑定 Agent：${curKb.agent?curKb.agent:'<span class="unbound">未绑定（去 Agent 管理绑定）</span>'} · 共 ${list.length} 项知识</div>
      </div>
      <button class="btn primary" style="margin-left:auto;" onclick="openAdd()">＋ 添加知识</button>
    </div>
    <div class="tabs">
      <div class="tab ${detailTab==="mat"?"active":""}" onclick="switchTab('mat')">资料</div>
      <div class="tab ${detailTab==="wiki"?"active":""}" onclick="switchTab('wiki')">Wiki 视图</div>
    </div>`;

  if(detailTab==="mat"){
    if(list.length===0){
      body += `
        <div class="empty">
          <div class="ei">📄</div>
          <div class="et">知识本还没有知识</div>
          <div class="ed">点击「添加知识」，可选择知识本 / 云空间文件 / 上传本地文件，三种来源统一汇入该知识本。</div>
          <button class="btn primary" onclick="openAdd()">＋ 添加知识</button>
        </div>`;
      main.innerHTML = body; return;
    }
    body += `
      <div class="toolbar">
        <div class="search-box">🔍 搜索资料</div>
        <span class="pill">▾ 来源方式</span>
        <span class="pill" style="margin-left:auto;color:#94a3b8;">共 ${list.length} 项 · 仅支持查看 / 删除</span>
      </div>
      <div class="card"><table>
        <thead><tr><th style="width:44%">资料名称</th><th>来源方式</th><th>时间</th><th>操作</th></tr></thead>
        <tbody>
          ${list.map((m,i)=>`
            <tr>
              <td><span class="fico" style="background:${m.c};">${m.ext}</span>${m.n}</td>
              <td><span class="from ${m.from}">${fromTxt[m.from]}</span></td>
              <td style="color:#64748b;">${m.t}</td>
              <td><span class="op" onclick="event.stopPropagation();toast('预览：${m.n}')">查看</span><span class="op-sep">·</span><span class="op danger" onclick="event.stopPropagation();delMat(${i})">删除</span></td>
            </tr>`).join("")}
        </tbody>
      </table></div>`;
  } else {
    body += `
      <div class="wiki-wrap">
        <div class="wiki-top">
          <div class="ai">✦ AI 已生成 Wiki 视图</div>
          <button class="btn ghost sm" style="margin-left:auto;" onclick="openPrompt()">✎ 编辑结构</button>
        </div>
        ${wikiTree.map((w,i)=>`
          <div class="wnode g" onclick="toggleWiki(${i})">${w.open?"▾":"▸"} ${w.g}<span class="cnt">${w.cnt}</span></div>
          ${w.open? w.items.map(it=>`<div class="wnode leaf"><span class="wdot">·</span>${it}</div>`).join("") : ""}
        `).join("")}
      </div>`;
  }
  main.innerHTML = body;
}
function toggleWiki(i){ wikiTree[i].open=!wikiTree[i].open; render(); }
function delMat(i){ if(confirm("确认从知识本移除该资料？")){ curKb.docs.splice(i,1); render(); toast("已删除资料"); } }

/* ---------------- create KB（仅命名，创建后进详情页添加知识）---------------- */
function openCreate(){ flow={ step:"name", kbName:"", targetKb:null, way:null, picked:new Set() }; overlay.classList.add("show"); stepName(); }
function closeModal(){ overlay.classList.remove("show"); }

function stepName(){
  modal.innerHTML = `
    <div class="modal-head"><span class="mt">📚 创建知识本</span><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">
      <div class="field"><label>知识本名称</label><input id="kbName" placeholder="如：群运维知识库" value="${flow.kbName}" oninput="flow.kbName=this.value"></div>
    </div>
    <div class="modal-foot"><div class="sp"></div>
      <button class="btn primary" onclick="doCreateKb()">创建</button>
    </div>`;
  setTimeout(()=>{ const el=document.getElementById("kbName"); if(el) el.focus(); },30);
}
function doCreateKb(){
  const nm = (flow.kbName||"").trim() || "未命名知识本";
  const id = "KB-" + Math.floor(1000 + Math.random()*9000);
  const kb = { id, name:nm, user:"青远（张振）", agent:null, updated:nowStr(), docs:[] };
  kbs.unshift(kb);
  closeModal();
  toast("已创建知识本 " + id + "，进入详情页添加知识");
  openDetail(id);
}

/* ---------------- add flow（详情页添加知识）---------------- */
function openAdd(){ flow={ step:1, targetKb:curKb.id, way:null, picked:new Set() }; overlay.classList.add("show"); showFlow(); }
function showFlow(){
  overlay.classList.add("show");
  if(flow.step===1) return stepWay();
  if(flow.step===2) return stepWayDetail();
}
function stepWay(){
  modal.innerHTML = `
    <div class="modal-head"><span class="mt">＋ 添加知识</span><span class="step">选择添加方式 · 汇入知识本 ${flow.targetKb}</span><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">
      <p style="font-size:13px;color:#64748b;margin-bottom:14px;">三种来源的文件都会<b>汇入同一个知识本</b>，统一整理、生成 Wiki 并支持 LLM 语义检索。</p>
      <div class="ways">
        <div class="way" onclick="chooseWay('book')"><div class="wi">📚</div><div class="wn">选择知识本</div><div class="wd">绑定有权限的知识本</div></div>
        <div class="way" onclick="chooseWay('cloud')"><div class="wi">☁️</div><div class="wn">选择云空间文件</div><div class="wd">文档 / 文件夹批量</div></div>
        <div class="way" onclick="chooseWay('local')"><div class="wi">⬆️</div><div class="wn">上传本地文件</div><div class="wd">PDF / Word / PPT…</div></div>
      </div>
    </div>
    <div class="modal-foot"><div class="sp"></div><span class="cnt">选择一种方式继续</span></div>`;
}
function chooseWay(w){ flow.way=w; flow.picked=new Set(); flow.step=2; showFlow(); }
function stepWayDetail(){
  if(flow.way==="book") return detailBook();
  if(flow.way==="cloud") return detailCloud();
  if(flow.way==="local") return detailLocal();
}
function detailBook(){
  modal.innerHTML = `
    <div class="modal-head"><span class="mt">📚 选择知识本</span><span class="step">可多选 · 选中即选中本内全部来源</span><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">
      ${notebooks.map(n=>`
        <div class="srow ${flow.picked.has(n.id)?"on":""}" onclick="tPick('${n.id}')">
          <div class="sic">📓</div>
          <div class="sinfo"><div class="snm">${n.name}</div><div class="smeta">${n.cnt} 个来源 · 创建人 ${n.by} · ${n.date}</div></div>
          <div class="schk">${flow.picked.has(n.id)?"✓":""}</div>
        </div>`).join("")}
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="flow.step=1;showFlow()">←</button>
      <span class="cnt" style="margin-left:6px;">已选择 ${flow.picked.size} 个知识本（共 ${sumBook()} 个来源）</span>
      <div class="sp"></div>
      <button class="btn primary" style="${flow.picked.size?"":"opacity:.5;pointer-events:none;"}" onclick="doAddBook()">添加（${sumBook()}）</button>
    </div>`;
}
function sumBook(){ let s=0; flow.picked.forEach(id=>{ const n=notebooks.find(x=>x.id===id); s+=n?n.cnt:0; }); return s; }
function detailCloud(){
  modal.innerHTML = `
    <div class="modal-head"><span class="mt">☁️ 选择云空间文件</span><span class="step">关键字 / 链接搜索 · 多选 · 支持文件夹</span><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">
      <div class="cloud-search"><input placeholder="输入关键字或粘贴文档链接搜索…" value="cli"><button class="btn primary sm" style="border-radius:8px;">🔍 搜索</button></div>
      <div style="display:flex;align-items:center;margin-bottom:8px;font-size:13px;cursor:pointer;" onclick="tAll()">
        <span class="checkbox ${allOn()?"on":""}">${allOn()?"✓":""}</span>全部（${cloudDocs.length}）
      </div>
      ${cloudDocs.map(c=>`
        <div style="display:flex;align-items:center;padding:10px 6px;border-bottom:1px solid #f8fafc;cursor:pointer;" onclick="tPick('${c.id}')">
          <span class="checkbox ${flow.picked.has(c.id)?"on":""}">${flow.picked.has(c.id)?"✓":""}</span>
          <span class="fico" style="background:${c.folder?"#f59e0b":"#2563eb"};">${c.folder?"📁":"doc"}</span>
          <div><div style="font-size:13px;font-weight:600;color:#0f172a;">${c.name}</div><div style="font-size:11px;color:#94a3b8;">POPO文档 · ${c.by}</div></div>
        </div>`).join("")}
    </div>
    <div class="modal-foot"><button class="btn ghost" onclick="flow.step=1;showFlow()">←</button>
      <div class="sp"></div>
      <button class="btn primary" style="${flow.picked.size?"":"opacity:.5;pointer-events:none;"}" onclick="doAddCloud()">添加（${flow.picked.size}）</button>
    </div>`;
}
function allOn(){ return flow.picked.size===cloudDocs.length; }
function tAll(){ if(allOn()) flow.picked=new Set(); else cloudDocs.forEach(c=>flow.picked.add(c.id)); showFlow(); }
function detailLocal(){
  modal.innerHTML = `
    <div class="modal-head"><span class="mt">⬆️ 上传本地文件</span><span class="step">支持 PDF / Word / PPT / 图片 / 视频 等</span><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body"><div class="upzone"><div class="ui">⬆️</div><div style="font-weight:600;color:#475569;">点击选择文件，或拖拽到此处</div><div style="font-size:12px;margin-top:6px;">上传后作为一个知识来源写入知识本</div></div></div>
    <div class="modal-foot"><button class="btn ghost" onclick="flow.step=1;showFlow()">←</button>
      <div class="sp"></div>
      <button class="btn primary" onclick="doAddLocal()">模拟上传 1 个文件</button>
    </div>`;
}
function tPick(id){ flow.picked.has(id)?flow.picked.delete(id):flow.picked.add(id); showFlow(); }

/* commit */
function targetKbObj(){ return kbs.find(k=>k.id===flow.targetKb); }
function nowStr(){ return "2026-07-23 " + new Date().toTimeString().slice(0,5); }
function doAddBook(){
  const kb=targetKbObj(); let added=0;
  flow.picked.forEach(id=>{ const n=notebooks.find(x=>x.id===id); for(let i=0;i<n.cnt;i++){ kb.docs.push({n:`${n.name.slice(0,10)}… 来源${i+1}`, ext:"本", c:"#059669", from:"book", t:nowStr()}); added++; } });
  finishAdd(added,"知识本来源");
}
function doAddCloud(){
  const kb=targetKbObj(); let added=0;
  flow.picked.forEach(id=>{ const c=cloudDocs.find(x=>x.id===id); if(c.folder){ for(let i=0;i<12;i++){ kb.docs.push({n:`CLI项目文档-${i+1}`, ext:"doc", c:"#2563eb", from:"cloud", t:nowStr()}); added++; } } else { kb.docs.push({n:c.name, ext:"doc", c:"#2563eb", from:"cloud", t:nowStr()}); added++; } });
  finishAdd(added,"云空间文档");
}
function doAddLocal(){
  const kb=targetKbObj(); kb.docs.push({n:"本地上传文件.pdf", ext:"pdf", c:"#ef4444", from:"local", t:nowStr()});
  finishAdd(1,"本地文件");
}
function finishAdd(n,label){
  const kb=targetKbObj(); kb.updated=nowStr();
  closeModal();
  toast(`已添加 ${n} 个${label}，汇入知识本 ${kb.id}，正在生成 Wiki…`);
  openDetail(kb.id);
}

/* wiki prompt */
function openPrompt(){
  overlay.classList.add("show");
  modal.innerHTML = `
    <div class="modal-head"><span class="mt">✎ 自定义 Wiki 视图结构</span><span class="x" onclick="closeModal()">×</span></div>
    <div class="modal-body">
      <p style="font-size:12px;color:#94a3b8;margin-bottom:8px;">默认 Prompt 负责整理目录结构，可自行编辑后重新生成（复用知识本能力）。</p>
      <textarea class="prompt-box">请帮我重新组织这个知识库的 Wiki 结构，把资源自动归类到以下分组：服务端、前端、策划</textarea>
    </div>
    <div class="modal-foot"><div class="sp"></div>
      <button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="closeModal();toast('已按新结构重新生成 Wiki 视图')">重新生成视图</button>
    </div>`;
}

let toastTimer;
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2800); }

render();
</script>
</body>
</html>
